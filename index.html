<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Animextreme — Meta Ads</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap');
:root{
  --bg:#0a0a0c;--surface:#111114;--surface2:#18181d;--surface3:#222228;
  --border:rgba(255,255,255,0.06);--border-md:rgba(255,255,255,0.11);
  --text:#ededf0;--text-2:#8a8a9a;--text-3:#4a4a5a;
  --accent:#e63946;--accent2:#ff6b35;
  --green:#22c55e;--green-bg:rgba(34,197,94,0.08);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.08);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.08);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.08);
  --blue:#60a5fa;
  --r:12px;--r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
@keyframes rot{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .4s ease both;}
.fu1{animation-delay:.00s}.fu2{animation-delay:.06s}.fu3{animation-delay:.12s}
.fu4{animation-delay:.18s}.fu5{animation-delay:.24s}.fu6{animation-delay:.30s}

/* ── HEADER ── */
.hdr{padding:14px 28px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);background:var(--surface);
  position:sticky;top:0;z-index:30;gap:12px;flex-wrap:wrap;}
.hdr-left{display:flex;align-items:center;gap:12px;}
.ax-pill{background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.1em;color:white;padding:4px 10px;border-radius:6px;}
.hdr-name{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;}
.hdr-sub{font-size:11px;color:var(--text-3);margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.countdown{display:flex;align-items:center;gap:8px;
  background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);
  border-radius:var(--r-sm);padding:5px 12px;}
.cd-num{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--accent);line-height:1;}
.cd-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;}
.upd{font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace;}

/* ── COMPARE MODE TOGGLE ── */
.cmp-toggle{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-2);cursor:pointer;user-select:none;}
.cmp-toggle input[type=checkbox]{appearance:none;width:32px;height:18px;
  background:var(--surface3);border-radius:9px;position:relative;cursor:pointer;transition:background .2s;}
.cmp-toggle input[type=checkbox]:checked{background:var(--accent);}
.cmp-toggle input[type=checkbox]::after{content:'';position:absolute;width:14px;height:14px;
  background:white;border-radius:50%;top:2px;left:2px;transition:left .2s;}
.cmp-toggle input[type=checkbox]:checked::after{left:16px;}

/* ── PERIOD BAR ── */
.period-wrap{background:var(--surface);border-bottom:1px solid var(--border);}
.period{padding:0 28px;display:flex;align-items:center;flex-wrap:wrap;}
.pb{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  padding:12px 14px;border:none;background:transparent;color:var(--text-2);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.pb:hover{color:var(--text);}
.pb.active{color:var(--accent);border-bottom-color:var(--accent);}
.cr{display:none;align-items:center;gap:8px;margin-left:auto;padding:8px 0;}
.cr.on{display:flex;}
.cr input{font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;
  border:1px solid var(--border-md);border-radius:6px;background:var(--surface2);color:var(--text);}
.cr-btn{font-size:11px;font-weight:600;padding:5px 12px;background:var(--accent);
  color:white;border:none;border-radius:6px;cursor:pointer;}

/* Compare period row */
.cmp-period{display:none;padding:8px 28px;border-top:1px solid var(--border);
  align-items:center;gap:10px;font-size:12px;color:var(--text-2);flex-wrap:wrap;}
.cmp-period.on{display:flex;}
.cmp-period input{font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;
  border:1px solid var(--border-md);border-radius:6px;background:var(--surface2);color:var(--text);}
.cmp-period label{font-size:11px;color:var(--text-3);}

/* ── MAIN ── */
.main{padding:18px 28px 56px;display:flex;flex-direction:column;gap:14px;max-width:1440px;margin:0 auto;}

/* ── HERO KPIs ── */
.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  background:var(--border);border-radius:var(--r);overflow:hidden;}
.hk{background:var(--surface);padding:18px 20px 14px;position:relative;transition:background .15s;}
.hk:hover{background:var(--surface2);}
.hk-stripe{position:absolute;top:0;left:0;right:0;height:3px;}
.hk-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:7px;}
.hk-label-wrap{display:flex;align-items:center;gap:4px;}
.hk-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);}
.hk-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.bok{background:var(--green-bg);color:var(--green);}
.bwk{background:var(--amber-bg);color:var(--amber);}
.bbd{background:var(--red-bg);color:var(--red);}
.bnt{background:rgba(255,255,255,.04);color:var(--text-3);}
.hk-val{font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;letter-spacing:-.01em;line-height:1.1;}
.hk-meta{font-size:11px;color:var(--text-3);margin-top:4px;}
.hk-delta{margin-top:7px;font-size:11px;font-weight:500;
  display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;}
.hk-cmp{margin-top:4px;font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace;}
.up{background:var(--green-bg);color:var(--green);}
.dn{background:var(--red-bg);color:var(--red);}
.nt{background:rgba(255,255,255,.04);color:var(--text-3);}



/* ── APRENDIZADO ── */
.aprendizado-strip{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.2);
  border-radius:var(--r-sm);padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:12px;}
.ap-icon{font-size:16px;flex-shrink:0;}
.ap-body{flex:1;}
.ap-title{font-weight:600;color:var(--amber);}
.ap-desc{color:var(--text-3);font-size:11px;margin-top:2px;}

/* ── VERBA ── */
.verba-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;}
.verba-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:12px;flex-wrap:wrap;}
.verba-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:.02em;}
.verba-nums{display:flex;gap:20px;flex-wrap:wrap;}
.vn-item{text-align:right;}
.vn-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.vn-val{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;line-height:1;}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);margin-bottom:5px;}
.prog-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:12px;}
.prog-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .8s ease;}

/* ── CARDS ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;}
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:12px;}
.card-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:.02em;}
.card-sub{font-size:11px;color:var(--text-3);margin-top:2px;}

/* ── METRIC SELECTOR ── */
.metric-sel{display:flex;gap:4px;flex-wrap:wrap;}
.ms-btn{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  padding:3px 9px;border-radius:4px;border:1px solid var(--border-md);
  background:transparent;color:var(--text-3);cursor:pointer;transition:all .12s;
  text-transform:uppercase;letter-spacing:.04em;}
.ms-btn.active{color:white;border-color:transparent;}
.ms-roas{background:#7c3aed;}
.ms-custo{background:#dc2626;}
.ms-ctr{background:#d97706;}
.ms-cpm{background:#0891b2;}
.ms-invest{background:#e63946;}

/* ── GRAN ── */
.gran{display:flex;gap:3px;flex-shrink:0;}
.gb{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  padding:3px 8px;border-radius:4px;border:1px solid var(--border-md);
  background:transparent;color:var(--text-3);cursor:pointer;transition:all .12s;
  text-transform:uppercase;letter-spacing:.04em;}
.gb.active{background:var(--accent);color:white;border-color:var(--accent);}

.leg{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2);}
.ls{width:8px;height:8px;border-radius:2px;}

/* ── ALERTAS ── */
.alerts{display:flex;flex-direction:column;gap:5px;margin-bottom:10px;}
.alert{display:flex;align-items:center;gap:10px;padding:8px 12px;
  border-radius:var(--r-sm);font-size:12px;border-left:2px solid;}
.aok{border-color:var(--green);background:rgba(34,197,94,.05);}
.awk{border-color:var(--amber);background:rgba(245,158,11,.05);}
.abd{border-color:var(--red);background:rgba(239,68,68,.05);}
.a-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.aok .a-dot{background:var(--green);}.awk .a-dot{background:var(--amber);}.abd .a-dot{background:var(--red);}
.a-body{flex:1;}.a-title{font-weight:500;color:var(--text);font-size:12px;}
.a-desc{color:var(--text-3);font-size:10px;margin-top:1px;}
.a-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-2);white-space:nowrap;}

/* ── INSIGHTS ── */
.insight-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.insight{background:var(--surface2);border-radius:var(--r-sm);padding:12px 14px;border-left:3px solid;}
.insight-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:5px;}
.insight-val{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;line-height:1.1;}
.insight-sub{font-size:10px;color:var(--text-3);margin-top:3px;line-height:1.4;}
.meta-prog{margin-top:10px;}
.meta-prog-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--text-3);margin-bottom:4px;}
.meta-prog-track{height:6px;background:var(--surface);border-radius:3px;overflow:hidden;}
.meta-prog-bar{height:100%;border-radius:3px;transition:width .8s ease;}

/* ── CARRINHO ── */
.cart-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cart-item{background:var(--surface2);border-radius:var(--r-sm);padding:11px 13px;}
.ci-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:4px;}
.ci-val{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;line-height:1.1;}
.ci-sub{font-size:10px;color:var(--text-3);margin-top:2px;}

/* ── RANKING ── */
.ranking{display:flex;flex-direction:column;gap:6px;}
.rk-item{display:flex;align-items:center;gap:12px;padding:11px 13px;
  background:var(--surface2);border-radius:var(--r-sm);transition:background .15s;}
.rk-item:hover{background:var(--surface3);}
.rk-pos{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:var(--text-3);min-width:18px;text-align:center;}
.gold{color:#f59e0b;}.silver{color:#9ca3af;}.bronze{color:#b45309;}
.rk-info{flex:1;min-width:0;}
.rk-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rk-set{font-size:10px;color:var(--text-3);margin-top:1px;}
.rk-bar-track{height:3px;background:var(--surface);border-radius:2px;overflow:hidden;margin-top:4px;}
.rk-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.rk-metrics{display:flex;gap:14px;flex-shrink:0;}
.rk-m{text-align:right;min-width:50px;}
.rk-m-val{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}
.rk-m-label{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-top:1px;}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  color:var(--text-3);padding:7px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;}
th.r{text-align:right;}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
td.r{text-align:right;font-family:'DM Mono',monospace;font-size:11px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.dc{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-2);}
.vup{color:var(--green);}.vdn{color:var(--red);}
tr.learn-row td{opacity:.7;font-style:italic;}

.empty{display:flex;align-items:center;justify-content:center;min-height:90px;color:var(--text-3);font-size:13px;}

/* ── LOGIN ── */
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r);padding:40px 36px;width:100%;max-width:380px;text-align:center;}
.login-logo{display:inline-flex;background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:.1em;
  color:white;padding:6px 14px;border-radius:8px;margin-bottom:20px;}
.login-title{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text-3);margin-bottom:28px;}
.login-field{width:100%;background:var(--surface2);border:1px solid var(--border-md);
  border-radius:var(--r-sm);padding:11px 14px;font-family:'DM Sans',sans-serif;
  font-size:14px;color:var(--text);outline:none;transition:border-color .15s;
  margin-bottom:10px;text-align:left;}
.login-field:focus{border-color:var(--accent);}
.login-field::placeholder{color:var(--text-3);}
.login-btn{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:white;border:none;border-radius:var(--r-sm);padding:12px;
  font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:.04em;
  cursor:pointer;transition:opacity .15s;margin-top:4px;}
.login-btn:hover{opacity:.9;}
.login-err{color:var(--red);font-size:12px;margin-top:8px;min-height:18px;}

/* ── SEGUIDORES ── */
.seg-chart-wrap{margin-top:12px;}
.seg-stats{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.seg-stat{background:var(--surface2);border-radius:var(--r-sm);padding:10px 14px;flex:1;min-width:80px;}
.seg-stat-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.seg-stat-val{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;}

/* ── SPARKLINE ── */
.hk-spark{margin-top:6px;height:24px;width:100%;}

/* ── TOKEN ALERTA ── */
.token-alert{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);
  border-radius:var(--r-sm);padding:8px 14px;display:flex;align-items:center;gap:10px;font-size:12px;}
.token-warn{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);
  border-radius:var(--r-sm);padding:8px 14px;display:flex;align-items:center;gap:10px;font-size:12px;}

/* ── MELHOR DIA ── */
.best-day-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.bd-item{background:var(--surface2);border-radius:var(--r-sm);padding:8px 4px;
  text-align:center;position:relative;overflow:hidden;transition:background .15s;}
.bd-item.best{background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.2);}
.bd-item.worst{background:rgba(239,68,68,0.08);}
.bd-label{font-size:10px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px;}
.bd-roas{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;line-height:1;}
.bd-sub{font-size:9px;color:var(--text-3);margin-top:2px;}
.bd-bar{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 var(--r-sm) var(--r-sm);}

/* ── CAMPANHAS ── */
.camp-grid{display:flex;flex-direction:column;gap:6px;}
.camp-item{display:flex;align-items:center;gap:12px;padding:10px 12px;
  background:var(--surface2);border-radius:var(--r-sm);}
.camp-name{flex:1;min-width:0;}
.camp-n{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.camp-s{font-size:10px;color:var(--text-3);margin-top:1px;}
.camp-bar-wrap{width:80px;}
.camp-bar-track{height:4px;background:var(--surface);border-radius:2px;overflow:hidden;margin-top:4px;}
.camp-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.camp-metrics{display:flex;gap:12px;flex-shrink:0;}
.camp-m{text-align:right;min-width:44px;}
.camp-m-val{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}
.camp-m-label{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-top:1px;}

/* ── ABAS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px;}
.tab-btn{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;
  padding:10px 18px;border:none;background:transparent;color:var(--text-2);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-panel{display:none;}.tab-panel.active{display:block;}

/* ── CRIATIVOS ── */
.criativos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.criativo-card{background:var(--surface2);border-radius:var(--r);overflow:hidden;
  border:1px solid var(--border);transition:border-color .2s;}
.criativo-card:hover{border-color:var(--border-md);}
.criativo-img{width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--surface3);}
.criativo-img-wrap{position:relative;}
.criativo-tipo{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.7);
  color:white;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;
  text-transform:uppercase;letter-spacing:.05em;}
.criativo-body{padding:12px 14px;}
.criativo-name{font-size:12px;font-weight:500;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px;}
.criativo-set{font-size:10px;color:var(--text-3);margin-bottom:10px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.criativo-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.cm{background:var(--surface);border-radius:var(--r-sm);padding:7px 8px;text-align:center;}
.cm-val{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;line-height:1;}
.cm-label{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px;}
.criativo-metrics-2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;}
.criativo-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;

<body>

<!-- TELA DE LOGIN -->
<div class="login-screen" id="login-screen">

    <div style="width:28px;height:28px;border:2px solid rgba(255,255,255,.08);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite"></div>
    <span style="font-size:13px">Carregando dados…</span>
  </div>
</div>

<script>
const DADOS_URL = 'https://raw.githubusercontent.com/nairomoreira/relatorio-campanhas/main/dados.json';

// ── LOGIN CONFIG ──────────────────────────────────────────
// Troque usuário e senha antes de publicar
const AUTH = {
  usuario: 'animextreme',
  senha:   'ax34@2026',
};

function fazerLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  if (u === AUTH.usuario && p === AUTH.senha) {
    document.getElementById('login-screen').style.display = 'none';
    sessionStorage.setItem('ax-auth', '1');
    if (!raw.length) init();
  } else {
    err.textContent = 'Usuário ou senha incorretos.';
    document.getElementById('login-pass').value = '';
    document.getElementById('login-pass').focus();
  }
}

function verificarLogin() {
  if (sessionStorage.getItem('ax-auth') === '1') {
    document.getElementById('login-screen').style.display = 'none';
    return true;
  }
  // Não carrega dados até fazer login
  return false;
}
const CFG = {
  verbaTotal:25000, dataEvento:'2026-10-17', metaCompras:1000,
  roasMin:2.0, roasOtimo:3.0, custoCompraMax:30, custoCompraOtimo:20,
  ctrMin:1.0, freqMax:4.0,
  // Dias de aprendizado — campanha nova < 7 dias considera em aprendizado
  diasAprendizado: 7,
};



let raw=[], rawAds=[], rawCriativos=[], rawSeguidores=[], tokenExpira=null, periodo='7d', gran='dia', charts={};
let customFrom=null, customTo=null;
let compareMode=false, cmpFrom=null, cmpTo=null;
let metricaAtiva='roas';

// ── BOOT ──────────────────────────────────────────────────
async function init() {
  // Verifica login — se não estiver autenticado, aguarda
  if (!verificarLogin()) return;
  renderCountdown();
  try {
    const ctrl=new AbortController(); setTimeout(()=>ctrl.abort(),12000);
    const res=await fetch(DADOS_URL+'?t='+Date.now(),{signal:ctrl.signal});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json=await res.json();
    raw=(json.dias||[]).filter(d=>d&&d.data).sort((a,b)=>a.data.localeCompare(b.data));
    rawAds=(json.anuncios||[]);
    rawCriativos=(json.criativos||[]);
    rawSeguidores=(json.seguidores||[]);
    tokenExpira=json.tokenExpira||null;
    const upd=document.getElementById('upd');
    if(upd&&json.atualizadoEm) upd.textContent='Atualizado '+json.atualizadoEm;
    buildApp(); render();
  } catch(e) {
    document.getElementById('app').innerHTML=
      '<div class="err"><strong style="display:block;margin-bottom:6px">Erro ao carregar dados</strong>'+
      (e.name==='AbortError'?'Tempo limite excedido.':e.message)+'</div>';
  }
}

// ── DATA UTILS ────────────────────────────────────────────
function parseData(s){const p=String(s).split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function dataStr(dt){return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}

function renderCountdown(){
  const p=CFG.dataEvento.split('-');
  const ev=new Date(+p[0],+p[1]-1,+p[2]),hj=new Date();hj.setHours(0,0,0,0);
  const dias=Math.max(0,Math.round((ev-hj)/864e5));
  const el=document.getElementById('countdown');
  if(el) el.innerHTML='<div><div class="cd-num">'+dias+'</div><div class="cd-label">dias para o AX34</div></div>';
}

// ── FILTROS ───────────────────────────────────────────────
function filtrar(p){
  if(!raw.length) return[];
  const ult=parseData(raw[raw.length-1].data);let de,ate;
  if(p==='7d'){ate=ult;de=new Date(ult);de.setDate(de.getDate()-6);}
  else if(p==='30d'){ate=ult;de=new Date(ult);de.setDate(de.getDate()-29);}
  else if(p==='mes'){de=new Date(ult.getFullYear(),ult.getMonth(),1);ate=ult;}
  else if(p==='mes-ant'){de=new Date(ult.getFullYear(),ult.getMonth()-1,1);ate=new Date(ult.getFullYear(),ult.getMonth(),0);}
  else if(p==='custom'&&customFrom&&customTo){de=parseData(customFrom);ate=parseData(customTo);}
  else return raw;
  const ds=dataStr(de),as=dataStr(ate);
  return raw.filter(d=>d.data>=ds&&d.data<=as);
}
function filtrarAnt(){
  const cur=filtrar(periodo);if(!cur.length)return[];
  const de=parseData(cur[0].data),ate=parseData(cur[cur.length-1].data);
  const d=Math.round((ate-de)/864e5)+1;
  const deA=new Date(de);deA.setDate(deA.getDate()-d);
  const ateA=new Date(de);ateA.setDate(ateA.getDate()-1);
  return raw.filter(d=>d.data>=dataStr(deA)&&d.data<=dataStr(ateA));
}
function filtrarCmp(){
  if(!cmpFrom||!cmpTo) return[];
  return raw.filter(d=>d.data>=cmpFrom&&d.data<=cmpTo);
}

// ── AGREGAR ───────────────────────────────────────────────
const SK=['valorUsado','impressoes','alcance','cliquesLink','addCarrinho','compras','valorCompras'];
function somar(dias){
  const t=SK.reduce((a,m)=>{a[m]=dias.reduce((s,d)=>s+(+d[m]||0),0);return a;},{});
  t.ctr=t.impressoes?t.cliquesLink/t.impressoes*100:0;
  t.roas=t.valorUsado?t.valorCompras/t.valorUsado:0;
  t.custoC=t.compras?t.valorUsado/t.compras:0;
  t.custoA=t.addCarrinho?t.valorUsado/t.addCarrinho:0;
  t.freq=t.alcance?t.impressoes/t.alcance:0;
  t.cpm=t.impressoes?t.valorUsado/t.impressoes*1000:0;
  t.txConv=t.addCarrinho?t.compras/t.addCarrinho*100:0;
  return t;
}
function agrupar(dias,g){
  if(g==='dia') return dias.map(d=>({label:fd(d.data),...d,...somar([d])}));
  const map={};
  dias.forEach(d=>{
    let key;
    if(g==='semana'){const dt=parseData(d.data),dom=new Date(dt);dom.setDate(dt.getDate()-dt.getDay());key=dataStr(dom);}
    else key=d.data.slice(0,7);
    if(!map[key])map[key]=[];map[key].push(d);
  });
  return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]))
    .map(([k,v])=>({label:g==='semana'?'Sem '+fd(k):fm(k),...somar(v)}));
}
function calcVerba(){
  const inv=raw.reduce((s,d)=>s+(+d.valorUsado||0),0);
  const rest=CFG.verbaTotal-inv;
  const p=CFG.dataEvento.split('-');
  const ev=new Date(+p[0],+p[1]-1,+p[2]),hj=new Date();hj.setHours(0,0,0,0);
  const dr=Math.max(1,Math.round((ev-hj)/864e5));
  const ult7=raw.slice(-7);
  const mediaReal=ult7.length?ult7.reduce((s,d)=>s+(+d.valorUsado||0),0)/ult7.length:0;
  const diasVerba=mediaReal>0?Math.round(rest/mediaReal):null;
  const compTotal=raw.reduce((s,d)=>s+(+d.compras||0),0);
  const compUlt7=ult7.reduce((s,d)=>s+(+d.compras||0),0);
  const ritmoComp=ult7.length?compUlt7/ult7.length:0;
  const compNec=dr>0?(CFG.metaCompras-compTotal)/dr:0;
  const eficiencia=inv>0?compTotal/inv*100:0;
  return{inv,rest,dr,mediaNec:rest/dr,mediaReal,pct:Math.min(100,inv/CFG.verbaTotal*100),
         diasVerba,compTotal,ritmoComp,compNec,eficiencia};
}

// ── APRENDIZADO ───────────────────────────────────────────
function detectarAprendizado(dias){
  if(dias.length===0) return null;
  // Verifica se há alta variância no ROAS nos primeiros dias (sinal de aprendizado)
  const primeiros=dias.slice(0,Math.min(CFG.diasAprendizado,dias.length));
  const roasList=primeiros.map(d=>(+d.valorUsado>0?(+d.valorCompras||0)/(+d.valorUsado):0));
  const roasMedio=roasList.reduce((s,v)=>s+v,0)/roasList.length;
  const emAprendizado=roasMedio<CFG.roasMin&&primeiros.length<CFG.diasAprendizado;
  // Detecta campanhas com < 7 dias totais
  const totalDias=dias.length;
  if(totalDias<CFG.diasAprendizado){
    return{dias:totalDias,meta:CFG.diasAprendizado,roasMedio};
  }
  return null;
}

// ── FORMATOS ──────────────────────────────────────────────
function r2(n){return Math.round((+n||0)*100)/100;}
function fd(s){const[,m,d]=s.split('-');return d+'/'+m;}
function fm(s){const ms=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],[,m]=s.split('-');return ms[+m-1];}
function fN(n){if(n>=1e6)return(n/1e6).toFixed(1).replace('.',',')+' M';if(n>=1e3)return n.toLocaleString('pt-BR');return String(Math.round(n));}
function fR(n){return 'R$\u00a0'+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fP(n){return Number(n).toFixed(2).replace('.',',')+'\u0025';}
function fX(n){return Number(n).toFixed(2).replace('.',',')+'x';}
function dlt(a,b){return b?(a-b)/b*100:null;}



// ── COMPARE TOGGLE ────────────────────────────────────────
function toggleCompare(on){
  compareMode=on;
  document.getElementById('cmp-period').classList.toggle('on',on);
  if(!on){cmpFrom=null;cmpTo=null;}
  render();
}
function applyCmp(){
  cmpFrom=document.getElementById('cmp-df').value;
  cmpTo=document.getElementById('cmp-dt').value;
  if(cmpFrom&&cmpTo){
    document.getElementById('cmp-label').textContent=fd(cmpFrom)+' – '+fd(cmpTo);
    render();
  }
}

// ── BUILD APP ─────────────────────────────────────────────
function buildApp(){
  document.getElementById('app').innerHTML=`
  <div class="main">
    <div class="tabs">
      <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
      <button class="tab-btn" data-tab="criativos">🎨 Melhores criativos</button>
    </div>
    <div class="tab-panel active" id="tab-dashboard">
    <div id="token-alert"></div>
    <div class="hero fu fu1" id="hero"></div>
    <div class="insight-grid fu fu2" id="insights"></div>
    <div class="card fu fu3" id="seg-card" style="display:none">
      <div class="card-hd">
        <div>
          <div class="card-title">Crescimento de seguidores</div>
          <div class="card-sub">Facebook &amp; Instagram — últimos 30 dias</div>
        </div>
        <div class="gran">
          <button class="gb active" data-gs="facebook">Facebook</button>
          <button class="gb" data-gs="instagram">Instagram</button>
        </div>
      </div>
      <div class="seg-stats" id="seg-stats"></div>
      <div style="position:relative;height:180px"><canvas id="cSeg" role="img" aria-label="Crescimento de seguidores"></canvas></div>
    </div>
    <div class="verba-card fu fu3" id="verba"></div>
    <div id="aprendizado-wrap" class="fu fu3"></div>
    <div class="two-col fu fu4">
      <div class="card">
        <div class="card-hd">
          <div>
            <div class="card-title">Evolução de métricas</div>
            <div class="card-sub">Selecione a métrica para visualizar</div>
          </div>
          <div class="gran">
            <button class="gb active" data-g="dia">Dia</button>
            <button class="gb" data-g="semana">Sem</button>
            <button class="gb" data-g="mes">Mês</button>
          </div>
        </div>
        <div class="metric-sel" style="margin-bottom:10px">
          <button class="ms-btn active ms-roas" data-m="roas">ROAS</button>
          <button class="ms-btn ms-custo" data-m="custo">Custo/compra</button>
          <button class="ms-btn ms-ctr" data-m="ctr">CTR</button>
          <button class="ms-btn ms-cpm" data-m="cpm">CPM</button>
          <button class="ms-btn ms-invest" data-m="invest">Investimento</button>
        </div>
        <div class="alerts" id="alerts"></div>
        <div style="position:relative;height:210px"><canvas id="cMetric" role="img" aria-label="Evolução de métricas"></canvas></div>
      </div>
      <div class="card">
        <div class="card-hd">
          <div><div class="card-title">Carrinho &amp; Compras</div>
          <div class="card-sub">Métricas de conversão no período</div></div>
        </div>
        <div class="cart-grid" id="cart"></div>
      </div>
    </div>
    <div class="card fu fu5">
      <div class="card-hd">
        <div><div class="card-title">Ranking de anúncios</div>
        <div class="card-sub">Ordenado por compras no período</div></div>
      </div>
      <div class="ranking" id="ranking"></div>
    </div>
    <div class="card fu fu6">
      <div class="card-hd" style="flex-wrap:wrap;gap:8px">
        <div><div class="card-title">Detalhamento</div>
        <div class="card-sub" id="tbl-sub"></div></div>
        <div class="gran">
          <button class="gb active" data-gt="dia">Dia</button>
          <button class="gb" data-gt="semana">Semana</button>
          <button class="gb" data-gt="mes">Mês</button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table><thead><tr>
          <th>Período</th><th class="r">Valor usado</th><th class="r">Impressões</th>
          <th class="r">Alcance</th><th class="r">Freq.</th><th class="r">Cliques</th>
          <th class="r">CTR</th><th class="r">CPM</th><th class="r">Add carrinho</th>
          <th class="r">Custo/add</th><th class="r">Compras</th>
          <th class="r">Vlr compras</th><th class="r">Custo/compra</th><th class="r">ROAS</th>
        </tr></thead><tbody id="tbody"></tbody></table>
      </div>
    </div>
    </div><!-- /tab-dashboard -->
    <div class="tab-panel" id="tab-criativos">
      <div id="criativos-content"></div>
    </div>
  </div>`;

  // Tab buttons
  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('tab-'+b.dataset.tab).classList.add('active');
    if(b.dataset.tab==='criativos') renderCriativos();
  }));

  // Seguidores network toggle
  document.querySelectorAll('.gb[data-gs]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.gb[data-gs]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    renderSeguidores(b.dataset.gs);
  }));

  // Period buttons
  document.querySelectorAll('.pb').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.pb').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');periodo=b.dataset.p;
    document.getElementById('cr').classList.toggle('on',periodo==='custom');
    if(periodo!=='custom')render();
  }));
  // Gran chart
  document.querySelectorAll('.gb[data-g]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.gb[data-g]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');gran=b.dataset.g;
    renderMetricChart(filtrar(periodo),filtrarCmp());
    renderVerba(calcVerba(),filtrar(periodo));
  }));
  // Gran table
  document.querySelectorAll('.gb[data-gt]').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.gb[data-gt]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');renderTabela(filtrar(periodo),b.dataset.gt);
  }));
  // Metric selector
  document.querySelectorAll('.ms-btn').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('.ms-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');metricaAtiva=b.dataset.m;
    renderMetricChart(filtrar(periodo),filtrarCmp());
  }));
}

function applyCustom(){
  customFrom=document.getElementById('df').value;
  customTo=document.getElementById('dt').value;
  if(customFrom&&customTo)render();
}

// ── RENDER PRINCIPAL ──────────────────────────────────────
function render(){
  const dias=filtrar(periodo);
  const ant=compareMode?filtrarCmp():filtrarAnt();
  const tot=somar(dias),totA=somar(ant);
  const v=calcVerba();
  const ap=detectarAprendizado(dias);

  renderTokenAlerta();
  renderHero(tot,totA,dias.length,ant.length);
  renderInsights(tot,v,dias);
  renderVerba(v,dias);
  renderAprendizado(ap,dias);
  renderSeguidores('facebook');
  renderAlertas(tot);
  renderCart(tot,dias.length);
  renderMetricChart(dias,ant);
  renderRanking(dias);
  renderTabela(dias,'dia');
  document.querySelectorAll('.gb[data-gt]').forEach(b=>b.classList.remove('active'));
  const d=document.querySelector('.gb[data-gt="dia"]');if(d)d.classList.add('active');
}

// ── HERO ──────────────────────────────────────────────────
function renderHero(tot,ant,qtd,qtdAnt){
  const e=!qtd;
  const cmpLabel=compareMode&&qtdAnt?'vs período comparado':'vs período anterior';
  function badge(c1,c2,l1,l2,l3){return e?['bnt','—']:c1?['bok',l1]:c2?['bwk',l2]:['bbd',l3];}
  function dl(d,inv,label){
    if(d===null||e)return'';
    const u=inv?d<0:d>0;
    const html='<div class="hk-delta '+(u?'up':'dn')+'">'+(u?'↑ ':'↓ ')+Math.abs(d).toFixed(1)+'%</div>';
    return html+'<div class="hk-cmp">'+cmpLabel+'</div>';
  }
  const[ccC,ccT]=badge(tot.custoC<=CFG.custoCompraOtimo,tot.custoC<=CFG.custoCompraMax,'Ótimo','Aceitável','Acima do limite');
  const[ctC,ctT]=badge(tot.ctr>=CFG.ctrMin*1.5,tot.ctr>=CFG.ctrMin,'Ótimo','Aceitável','Abaixo');

function renderRanking(diasFiltrados){
  const el=document.getElementById('ranking');if(!el)return;
  if(!rawAds.length){el.innerHTML='<div class="empty">Dados de anúncios não disponíveis</div>';return;}
  const de=diasFiltrados.length?diasFiltrados[0].data:null;
  const ate=diasFiltrados.length?diasFiltrados[diasFiltrados.length-1].data:null;
  const af=de?rawAds.filter(a=>a.data>=de&&a.data<=ate):rawAds;
  const map={};
  af.forEach(a=>{
    const k=a.adName||'Sem nome';
    if(!map[k])map[k]={adName:k,adSet:a.adSet||'',valorUsado:0,compras:0,valorCompras:0,cliques:0,impressoes:0,addCarrinho:0};
    map[k].valorUsado+=+a.valorUsado||0;map[k].compras+=+a.compras||0;
    map[k].valorCompras+=+a.valorCompras||0;map[k].cliques+=+a.cliquesLink||0;
    map[k].impressoes+=+a.impressoes||0;map[k].addCarrinho+=+a.addCarrinho||0;
  });
  const ads=Object.values(map)
    .map(a=>({...a,roas:a.valorUsado?a.valorCompras/a.valorUsado:0,custoC:a.compras?a.valorUsado/a.compras:0}))
    .sort((a,b)=>b.compras-a.compras||b.valorCompras-a.valorCompras);
  if(!ads.length){el.innerHTML='<div class="empty">Sem dados de anúncios no período</div>';return;}
  const mx=ads[0].compras||1;
  const pc=['gold','silver','bronze'];
  el.innerHTML=ads.map((a,i)=>`

        <div class="rk-m"><div class="rk-m-val" style="color:${a.roas>=CFG.roasOtimo?'var(--green)':a.roas>=CFG.roasMin?'var(--amber)':'var(--red)'}">${a.roas>0?fX(a.roas):'—'}</div><div class="rk-m-label">ROAS</div></div>

// ── METRIC CHART ──────────────────────────────────────────
const METRIC_CFG={
  roas:  {label:'ROAS',fmt:fX,color:'#a78bfa',meta:CFG.roasOtimo,metaLabel:'Meta '+fX(CFG.roasOtimo),inv:false},
  custo: {label:'Custo/compra',fmt:fR,color:'#ef4444',meta:CFG.custoCompraMax,metaLabel:'Limite '+fR(CFG.custoCompraMax),inv:true},
  ctr:   {label:'CTR',fmt:fP,color:'#f59e0b',meta:CFG.ctrMin,metaLabel:'Mín '+fP(CFG.ctrMin),inv:false},
  cpm:   {label:'CPM',fmt:fR,color:'#0891b2',meta:null,inv:true},
  invest:{label:'Investimento',fmt:fR,color:'#e63946',meta:null,inv:false},
};

function getMetricVal(row,m){
  if(m==='roas') return row.roas||0;
  if(m==='custo') return row.custoC||0;
  if(m==='ctr') return row.ctr||0;
  if(m==='cpm') return row.cpm||0;
  if(m==='invest') return row.valorUsado||0;
  return 0;
}

function renderMetricChart(dias,antDias){
  if(charts.metric){charts.metric.destroy();delete charts.metric;}
  const rows=agrupar(dias,gran);
  if(!rows.length)return;
  const mc=METRIC_CFG[metricaAtiva];
  const vals=rows.map(r=>+(getMetricVal(r,metricaAtiva).toFixed(2)));
  const datasets=[{
    label:mc.label,data:vals,
    borderColor:mc.color,backgroundColor:mc.color.replace(')',',0.08)').replace('rgb','rgba').replace('#',mc.color+'22'),
    fill:true,tension:0.4,borderWidth:2,
    pointRadius:rows.length>20?0:4,
    pointBackgroundColor:mc.meta?vals.map(v=>mc.inv?v<=mc.meta?'#22c55e':'#ef4444':v>=mc.meta?'#22c55e':'#ef4444'):mc.color,
    pointBorderColor:'transparent',
  }];

  // Linha de meta
  if(mc.meta){
    datasets.push({label:mc.metaLabel,data:rows.map(()=>mc.meta),
      borderColor:'rgba(255,255,255,0.2)',backgroundColor:'transparent',
      borderDash:[5,4],borderWidth:1.5,pointRadius:0});
  }

  // Período de comparação
  if(compareMode&&antDias&&antDias.length){
    const rowsCmp=agrupar(antDias,gran);
    const valsCmp=rowsCmp.map(r=>+(getMetricVal(r,metricaAtiva).toFixed(2)));
    datasets.push({label:mc.label+' (comparação)',data:valsCmp,
      borderColor:mc.color+'99',backgroundColor:'transparent',
      borderDash:[3,3],borderWidth:1.5,
      pointRadius:rowsCmp.length>20?0:3,pointBorderColor:'transparent'});
  }

  charts.metric=new Chart(document.getElementById('cMetric'),{
    type:'line',data:{labels:rows.map(r=>r.label),datasets},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:compareMode,labels:{color:'#8a8a9a',font:{size:10}}},
        tooltip:{backgroundColor:'#18181d',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,padding:10,
          callbacks:{label:ctx=>ctx.dataset.label+': '+mc.fmt(ctx.parsed.y)}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.02)'},ticks:{font:{size:10},color:'#4a4a5a',maxTicksLimit:14,maxRotation:0}},
        y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{font:{size:10},color:'#4a4a5a',callback:v=>mc.fmt(v)},min:0}
      }}
  });
}

// ── TOKEN ALERTA ──────────────────────────────────────────
function renderTokenAlerta() {
  const el = document.getElementById('token-alert');
  if (!el || !tokenExpira) return;
  // Parse robusto da data ISO
  const p = String(tokenExpira).slice(0,10).split('-');
  const exp = new Date(+p[0], +p[1]-1, +p[2]);
  const hj  = new Date(); hj.setHours(0,0,0,0);
  const dias = Math.round((exp - hj) / 864e5);
  if (dias > 15) { el.innerHTML = ''; return; }
  const cls = dias <= 5 ? 'token-alert' : 'token-warn';
  const icon = dias <= 5 ? '🔴' : '⚠️';
  el.innerHTML = '<div class="' + cls + '">' +
    '<span style="font-size:16px">' + icon + '</span>' +
    '<div><strong style="color:' + (dias<=5?'var(--red)':'var(--amber)') + '">Token do Meta expira em ' + dias + ' dias</strong>' +
    '<div style="font-size:11px;color:var(--text-3);margin-top:2px">' +
    'Acesse developers.facebook.com → Graph API Explorer → gere um novo token e atualize o secret META_TOKEN no GitHub.' +
    '</div></div></div>';
}



// ── SEGUIDORES ───────────────────────────────────────────
function renderSeguidores(rede) {
  const card = document.getElementById('seg-card');

  if (!rawSeguidores.length) {
    if (card) card.style.display = 'none';
    return;
  }

  const dados = rawSeguidores
    .filter(s => s.rede === rede && s.data)
    .sort((a,b) => a.data.localeCompare(b.data));

  if (!dados.length) {
    if (card) card.style.display = 'none';
    return;
  }

  if (card) card.style.display = 'block';

  const totalAtual = dados[dados.length-1].total || 0;
  const totalInicio = dados[0].total || 0;
  const crescimento30 = totalAtual - totalInicio;
  const novosUlt7 = dados.slice(-7).reduce((s,d) => s+(+d.novos||0), 0);
  const media7 = novosUlt7 / Math.min(7, dados.length);

  // Stats
  const statsEl = document.getElementById('seg-stats');
  if (statsEl) {
    const corCresc = crescimento30 >= 0 ? 'var(--green)' : 'var(--red)';
    statsEl.innerHTML =
      '<div class="seg-stat"><div class="seg-stat-label">Total atual</div>' +
        '<div class="seg-stat-val" style="color:var(--blue)">' + fN(totalAtual) + '</div></div>' +
      '<div class="seg-stat"><div class="seg-stat-label">Crescimento 30d</div>' +
        '<div class="seg-stat-val" style="color:' + corCresc + '">' + (crescimento30>=0?'+':'') + fN(crescimento30) + '</div></div>' +
      '<div class="seg-stat"><div class="seg-stat-label">Média/dia (7d)</div>' +
        '<div class="seg-stat-val">+' + media7.toFixed(1) + '</div></div>';
  }

  // Gráfico diário — novos seguidores por dia (barras) + total acumulado (linha)
  if (charts.seg) { charts.seg.destroy(); delete charts.seg; }
  const el = document.getElementById('cSeg');
  if (!el) return;

  // Usa dados diários direto — sem agregar por semana para não distorcer
  const labels = dados.map(d => fd(d.data));
  const novos  = dados.map(d => Math.max(0, +d.novos||0));
  const totais  = dados.map(d => +d.total||0);

  charts.seg = new Chart(el, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Novos seguidores/dia',
          data: novos,
          backgroundColor: 'rgba(96,165,250,0.5)',
          borderColor: 'rgba(96,165,250,0.8)',
          borderWidth: 1,
          borderRadius: 2,
          order: 2,
          yAxisID: 'y',
        },
        {
          label: 'Total acumulado',
          data: totais,
          type: 'line',
          borderColor: '#60a5fa',
          backgroundColor: 'transparent',
          tension: 0.3,
          pointRadius: 0,
          borderWidth: 2,
          order: 1,
          yAxisID: 'y1',
        },
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, labels: { color: '#8a8a9a', font: { size: 10 }, boxWidth: 10 } },
        tooltip: {
          backgroundColor: '#18181d', borderColor: 'rgba(255,255,255,0.08)',
          borderWidth: 1, padding: 8,
          callbacks: {
            label: ctx => ctx.dataset.label + ': ' + fN(ctx.parsed.y),
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 9 }, color: '#4a4a5a', maxTicksLimit: 10, maxRotation: 0 }
        },
        y: {
          position: 'left',
          grid: { color: 'rgba(255,255,255,0.03)' },
          ticks: { font: { size: 9 }, color: '#4a4a5a' },
          title: { display: true, text: 'Novos/dia', color: '#4a4a5a', font: { size: 9 } },
        },
        y1: {
          position: 'right',
          grid: { display: false },
          ticks: { font: { size: 9 }, color: '#60a5fa', callback: v => fN(v) },
          title: { display: true, text: 'Total', color: '#60a5fa', font: { size: 9 } },
        },
      }
    }
  });
}

// ── CRIATIVOS ─────────────────────────────────────────────
function imgErr(el) {
  el.style.display = 'none';
  if (el.nextElementSibling) el.nextElementSibling.style.display = 'flex';
}
function renderCriativos() {
  const el = document.getElementById('criativos-content');
  if (!el) return;

  if (!rawCriativos.length) {
    el.innerHTML = '<div class="empty" style="min-height:200px;flex-direction:column;gap:8px">' +
      '<div style="font-size:28px;opacity:.3">🎨</div>' +
      '<div>Criativos ainda não disponíveis</div>' +
      '<div style="font-size:11px;color:var(--text-3)">Aguarde a próxima atualização automática</div>' +
      '</div>';
    return;
  }

  // Ordena por ROAS por padrão
  const ordenados = [...rawCriativos].sort((a,b) => b.roas - a.roas);

  const roasMax = Math.max(...ordenados.map(c=>c.roas));

  el.innerHTML = '<div style="margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">' +
    '<div>' +
      '<div style="font-family:Rajdhani,sans-serif;font-size:15px;font-weight:700">Melhores criativos</div>' +
      '<div style="font-size:11px;color:var(--text-3);margin-top:2px">Top anúncios por ROAS — imagens atualizadas a cada 6h</div>' +
    '</div>' +
    '<div style="font-size:11px;color:var(--text-3)">' + ordenados.length + ' criativos</div>' +
  '</div>' +
  '<div class="criativos-grid">' +
  ordenados.map((c, i) => {
    const roasColor = c.roas >= CFG.roasOtimo ? 'var(--green)' : c.roas >= CFG.roasMin ? 'var(--amber)' : 'var(--red)';
    const badgeColor = i === 0 ? '#f59e0b' : i === 1 ? '#9ca3af' : i === 2 ? '#b45309' : 'var(--text-3)';
    const medalha = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
    return '<div class="criativo-card">' +
      '<div class="criativo-img-wrap">' +
        '<img class="criativo-img" src="' + c.imageUrl + '" alt="' + c.adName + '" ' +
          'onerror="imgErr(this)" loading="lazy">' +
        '<div style="display:none;width:100%;aspect-ratio:1/1;align-items:center;justify-content:center;' +
          'background:var(--surface3);color:var(--text-3);font-size:12px;flex-direction:column;gap:6px">' +
          '<div style="font-size:24px;opacity:.4">🖼️</div><div>Imagem expirada</div>' +
        '</div>' +
        '<div class="criativo-tipo">' + c.tipo + '</div>' +
        (medalha ? '<div style="position:absolute;top:8px;left:8px;font-size:18px">' + medalha + '</div>' : '') +
      '</div>' +
      '<div class="criativo-body">' +
        '<div class="criativo-badge" style="background:' + roasColor + '22;color:' + roasColor + '">' +
          '<span>#' + (i+1) + ' por ROAS</span>' +
        '</div>' +
        '<div class="criativo-name" title="' + c.adName + '">' + c.adName + '</div>' +
        '<div class="criativo-set">' + (c.adSet || c.campaign || '') + '</div>' +
        '<div class="criativo-metrics">' +
          '<div class="cm"><div class="cm-val" style="color:' + roasColor + '">' + fX(c.roas) + '</div><div class="cm-label">ROAS</div></div>' +
          '<div class="cm"><div class="cm-val">' + fP(c.ctr) + '</div><div class="cm-label">CTR</div></div>' +
          '<div class="cm"><div class="cm-val">' + fR(c.cpc) + '</div><div class="cm-label">CPC</div></div>' +
        '</div>' +
        '<div class="criativo-metrics-2">' +
          '<div class="cm"><div class="cm-val">' + fN(c.alcance) + '</div><div class="cm-label">Alcance</div></div>' +
          '<div class="cm"><div class="cm-val">' + fR(c.cpm) + '</div><div class="cm-label">CPM</div></div>' +
          '<div class="cm"><div class="cm-val" style="color:var(--green)">' + fN(c.compras) + '</div><div class="cm-label">Compras</div></div>' +
          '<div class="cm"><div class="cm-val">' + fR(c.custoCompra||0) + '</div><div class="cm-label">Custo/compra</div></div>' +
          '<div class="cm"><div class="cm-val">' + fR(c.valorUsado) + '</div><div class="cm-label">Investido</div></div>' +
          '<div class="cm"><div class="cm-val" style="color:var(--green)">' + fR(c.valorCompras) + '</div><div class="cm-label">Vlr compras</div></div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('') +
  '</div>';
}

// Verifica se já está logado ao carregar a página
if (sessionStorage.getItem('ax-auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  init();
}
</script>
</body>
</html>
