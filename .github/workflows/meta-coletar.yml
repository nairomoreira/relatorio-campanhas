name: Atualizar dados Meta Ads

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  coletar-dados:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar coleta de dados
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: node coletar.js

      - name: Commit e push dos dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados.json
          git diff --staged --quiet && echo "Sem mudanças" && exit 0
          git commit -m "dados: $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M')"
          git fetch origin main
          git rebase -X theirs origin/main || git rebase --abort && git push --force-with-lease
          git push
