<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animextreme — Meta Ads</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap');

:root {
  --bg: #0a0a0c;
  --surface: #111114;
  --surface2: #18181d;
  --border: rgba(255,255,255,0.06);
  --border-md: rgba(255,255,255,0.11);
  --text: #ededf0;
  --text-2: #8a8a9a;
  --text-3: #4a4a5a;
  --accent: #e63946;
  --accent2: #ff6b35;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.08);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.08);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.08);
  --purple: #a78bfa;
  --r: 14px; --r-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

@keyframes rot { to { transform: rotate(360deg); } }
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.fu { animation: fadeUp .5s ease both; }
.fu1 { animation-delay: .0s; }
.fu2 { animation-delay: .08s; }
.fu3 { animation-delay: .16s; }
.fu4 { animation-delay: .24s; }

/* HEADER */
.hdr {
  padding: 18px 36px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  position: sticky; top: 0; z-index: 20;
}
.hdr-left { display: flex; align-items: center; gap: 14px; }
.ax-pill {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: .1em; color: white;
  padding: 4px 10px; border-radius: 6px;
}
.hdr-name { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700; }
.hdr-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.hdr-right { display: flex; align-items: center; gap: 12px; }
.upd { font-size: 11px; color: var(--text-3); font-family: 'DM Mono', monospace; }

/* PERIOD */
.period {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 36px; display: flex; align-items: center; flex-wrap: wrap; gap: 0;
}
.pb {
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
  padding: 13px 16px; border: none; background: transparent;
  color: var(--text-2); cursor: pointer;
  border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap;
}
.pb:hover { color: var(--text); }
.pb.active { color: var(--accent); border-bottom-color: var(--accent); }
.cr { display: none; align-items: center; gap: 8px; margin-left: auto; padding: 8px 0; }
.cr.on { display: flex; }
.cr input { font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 10px; border: 1px solid var(--border-md); border-radius: 6px; background: var(--surface2); color: var(--text); }
.cr-btn { font-size: 11px; font-weight: 600; padding: 5px 14px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; }

/* MAIN */
.main { padding: 28px 36px 56px; display: flex; flex-direction: column; gap: 20px; max-width: 1400px; margin: 0 auto; }

/* HERO KPIs */
.hero {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
  background: var(--border);
  border-radius: var(--r);
  overflow: hidden;
}
.hero-kpi {
  background: var(--surface);
  padding: 28px 28px 24px;
  position: relative;
  transition: background .2s;
}
.hero-kpi:hover { background: var(--surface2); }
.hero-kpi::after {
  content: '';
  position: absolute;
  bottom: 0; left: 28px; right: 28px;
  height: 2px; border-radius: 2px;
  opacity: 0; transition: opacity .2s;
}
.hero-kpi:hover::after { opacity: 1; }
.hk-label {
  font-size: 11px; font-weight: 500; text-transform: uppercase;
  letter-spacing: .07em; color: var(--text-3); margin-bottom: 12px;
}
.hk-val {
  font-family: 'Rajdhani', sans-serif; font-size: 40px; font-weight: 700;
  letter-spacing: -.01em; line-height: 1;
}
.hk-delta {
  margin-top: 10px; font-size: 12px; font-weight: 500;
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 8px; border-radius: 5px;
}
.up { background: var(--green-bg); color: var(--green); }
.dn { background: var(--red-bg); color: var(--red); }
.nt { background: rgba(255,255,255,.04); color: var(--text-3); }

/* MID ROW */
.mid { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }

/* ALERTS */
.alerts { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
.alert {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: var(--r-sm);
  font-size: 12px; border-left: 3px solid;
  background: var(--surface2);
}
.alert-ok  { border-color: var(--green); }
.alert-warn{ border-color: var(--amber); }
.alert-bad { border-color: var(--red);   }
.alert-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.alert-ok  .alert-dot { background: var(--green); }
.alert-warn .alert-dot { background: var(--amber); }
.alert-bad  .alert-dot { background: var(--red); }
.alert-body { flex: 1; }
.alert-title { font-weight: 500; color: var(--text); }
.alert-desc { color: var(--text-3); font-size: 11px; margin-top: 1px; }
.alert-num { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; color: var(--text-2); }

/* CHART CARD */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r); padding: 22px 24px;
}
.card-hd { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
.card-title { font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: .02em; }
.card-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
.gran { display: flex; gap: 3px; }
.gb {
  font-family: 'DM Sans', sans-serif; font-size: 10px; font-weight: 600;
  padding: 3px 8px; border-radius: 4px;
  border: 1px solid var(--border-md); background: transparent;
  color: var(--text-3); cursor: pointer; transition: all .12s;
  text-transform: uppercase; letter-spacing: .04em;
}
.gb.active { background: var(--accent); color: white; border-color: var(--accent); }

.leg { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
.li { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-2); }
.ls { width: 8px; height: 8px; border-radius: 2px; }

/* FUNIL (direita) */
.funil-card { display: flex; flex-direction: column; }
.funnel { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
.fs { display: flex; align-items: center; gap: 10px; }
.fl { min-width: 100px; }
.fn { font-size: 11px; font-weight: 500; }
.fnum { font-size: 10px; color: var(--text-3); font-family: 'DM Mono', monospace; }
.ftrack { flex: 1; height: 32px; background: var(--surface2); border-radius: 5px; overflow: hidden; }
.fbar { height: 100%; border-radius: 5px; display: flex; align-items: center; padding-left: 10px; font-size: 10px; font-weight: 700; color: white; transition: width .6s cubic-bezier(.16,1,.3,1); }
.fpct { min-width: 34px; text-align: right; font-size: 10px; font-family: 'DM Mono', monospace; color: var(--text-3); }
.farrow { font-size: 9px; color: var(--text-3); padding-left: 110px; }

/* TABLE */
.tbl-toggle {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; user-select: none;
  padding: 16px 0 0;
}
.tbl-toggle-label { font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: .02em; }
.tbl-toggle-icon { font-size: 12px; color: var(--text-3); transition: transform .2s; }
.tbl-toggle-icon.open { transform: rotate(180deg); }
.tbl-body { overflow: hidden; transition: max-height .3s ease; max-height: 0; }
.tbl-body.open { max-height: 2000px; }
.gran-tbl { display: flex; gap: 4px; margin: 14px 0 12px; }

.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
th { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--text-3); padding: 8px 10px; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
th.r { text-align: right; }
td { padding: 9px 10px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
td.r { text-align: right; font-family: 'DM Mono', monospace; font-size: 11px; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); }
.dc { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-2); }
.vup { color: var(--green); } .vdn { color: var(--red); }

.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 140px; color: var(--text-3); font-size: 13px; gap: 8px; }
.err { background: var(--red-bg); border: 1px solid rgba(239,68,68,.15); border-radius: var(--r); padding: 20px 24px; color: var(--red); font-size: 13px; line-height: 1.6; max-width: 480px; margin: 32px; }

@media (max-width: 900px) {
  .hdr, .period, .main { padding-left: 16px; padding-right: 16px; }
  .hero { grid-template-columns: repeat(2,1fr); }
  .mid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="ax-pill">AX34</div>
    <div>
      <div class="hdr-name">Animextreme</div>
      <div class="hdr-sub">Meta Ads — Resultados de campanha</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="upd" id="upd">—</span>
  </div>
</header>

<nav class="period">
  <button class="pb active" data-p="7d">Últimos 7 dias</button>
  <button class="pb" data-p="30d">Últimos 30 dias</button>
  <button class="pb" data-p="mes">Mês atual</button>
  <button class="pb" data-p="mes-ant">Mês anterior</button>
  <button class="pb" data-p="custom">Personalizado</button>
  <div class="cr" id="cr">
    <input type="date" id="df">
    <span style="color:var(--text-3);font-size:11px">até</span>
    <input type="date" id="dt">
    <button class="cr-btn" onclick="applyCustom()">Aplicar</button>
  </div>
</nav>

<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;color:var(--text-3)">
    <div style="width:28px;height:28px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite"></div>
    <span style="font-size:13px">Carregando dados…</span>
  </div>
</div>

<script>
const DADOS_URL = 'https://raw.githubusercontent.com/nairomoreira/relatorio-campanhas/main/dados.json';

const METAS = {
  roasMin: 2.0, roasOtimo: 3.0,
  custoCompraMax: 30, ctrMin: 1.0, freqMax: 4.0,
};

let raw = [], periodo = '7d', gran = 'dia', granTbl = 'dia';
let charts = {}, customFrom = null, customTo = null;

// ── BOOT ──────────────────────────────────────────────────
async function init() {
  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 10000);
    const res = await fetch(DADOS_URL + '?t=' + Date.now(), { signal: ctrl.signal });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    raw = (json.dias || []).filter(d => d && d.data).sort((a,b) => a.data.localeCompare(b.data));
    const upd = document.getElementById('upd');
    if (upd) upd.textContent = json.atualizadoEm && json.atualizadoEm !== '—' ? 'Atualizado em ' + json.atualizadoEm : '';
    buildApp();
    render();
  } catch(e) {
    document.getElementById('app').innerHTML =
      '<div class="err"><strong style="display:block;margin-bottom:6px">Erro ao carregar dados</strong>Verifique se dados.json está publicado no GitHub.<br><br>' + (e.name === 'AbortError' ? 'Tempo limite excedido.' : e.message) + '</div>';
  }
}

// ── FILTROS ───────────────────────────────────────────────
function filtrar(p) {
  if (!raw.length) return [];
  const ult = new Date(raw[raw.length-1].data + 'T00:00:00');
  let de, ate;
  if      (p==='7d')     { ate=ult; de=new Date(ult); de.setDate(de.getDate()-6); }
  else if (p==='30d')    { ate=ult; de=new Date(ult); de.setDate(de.getDate()-29); }
  else if (p==='mes')    { de=new Date(ult.getFullYear(),ult.getMonth(),1); ate=ult; }
  else if (p==='mes-ant'){ de=new Date(ult.getFullYear(),ult.getMonth()-1,1); ate=new Date(ult.getFullYear(),ult.getMonth(),0); }
  else if (p==='custom'&&customFrom&&customTo){ de=new Date(customFrom); ate=new Date(customTo); }
  else return raw;
  const ds=de.toISOString().slice(0,10), as=ate.toISOString().slice(0,10);
  return raw.filter(d=>d.data>=ds&&d.data<=as);
}

function filtrarAnt() {
  const cur=filtrar(periodo);
  if (!cur.length) return [];
  const de=new Date(cur[0].data+'T00:00:00'), ate=new Date(cur[cur.length-1].data+'T00:00:00');
  const d=Math.round((ate-de)/864e5)+1;
  const deA=new Date(de); deA.setDate(deA.getDate()-d);
  const ateA=new Date(de); ateA.setDate(ateA.getDate()-1);
  return raw.filter(d=>d.data>=deA.toISOString().slice(0,10)&&d.data<=ateA.toISOString().slice(0,10));
}

// ── SOMA ──────────────────────────────────────────────────
const SKEYS = ['valorUsado','impressoes','alcance','cliquesLink','cliquesTodos','resultados','addCarrinho','compras','valorCompras'];
function somar(dias) {
  const t = SKEYS.reduce((a,m)=>{ a[m]=dias.reduce((s,d)=>s+(+d[m]||0),0); return a; },{});
  t.ctr     = t.impressoes  ? t.cliquesLink/t.impressoes*100 : 0;
  t.cpc     = t.cliquesLink ? t.valorUsado/t.cliquesLink : 0;
  t.roas    = t.valorUsado  ? t.valorCompras/t.valorUsado : 0;
  t.custoC  = t.compras     ? t.valorUsado/t.compras : 0;
  t.custoA  = t.addCarrinho ? t.valorUsado/t.addCarrinho : 0;
  t.freq    = t.alcance     ? t.impressoes/t.alcance : 0;
  t.cpm     = t.impressoes  ? t.valorUsado/t.impressoes*1000 : 0;
  return t;
}

function agrupar(dias, g) {
  if (g==='dia') return dias.map(d=>({label:fd(d.data),...d,...somar([d])}));
  const map={};
  dias.forEach(d=>{
    let key;
    if (g==='semana') {
      const dt=new Date(d.data+'T00:00:00'), dom=new Date(dt);
      dom.setDate(dt.getDate()-dt.getDay()); key=dom.toISOString().slice(0,10);
    } else key=d.data.slice(0,7);
    if (!map[key]) map[key]=[];
    map[key].push(d);
  });
  return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>({
    label:g==='semana'?'Sem '+fd(k):fm(k),...somar(v)
  }));
}

// ── FORMATOS ──────────────────────────────────────────────
function fd(s){ const[,m,d]=s.split('-'); return d+'/'+m; }
function fm(s){ const ms=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],[,m]=s.split('-'); return ms[+m-1]; }
function fN(n){ if(n>=1e6) return (n/1e6).toFixed(1).replace('.',',')+' M'; if(n>=1e3) return n.toLocaleString('pt-BR'); return String(Math.round(n)); }
function fR(n){ return 'R$\u00a0'+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fP(n){ return Number(n).toFixed(2).replace('.',',')+'\u0025'; }
function fX(n){ return Number(n).toFixed(2).replace('.',',')+'x'; }
function dlt(a,b){ return b?(a-b)/b*100:null; }

// ── BUILD APP ─────────────────────────────────────────────
function buildApp() {
  document.getElementById('app').innerHTML = `
  <div class="main">

    <!-- HERO -->
    <div class="hero fu fu1" id="hero"></div>

    <!-- MID -->
    <div class="mid fu fu2">
      <div class="card">
        <div class="card-hd">
          <div>
            <div class="card-title">Investimento vs Compras</div>
            <div class="card-sub">Evolução no período</div>
          </div>
          <div class="gran">
            <button class="gb active" data-g="dia">Dia</button>
            <button class="gb" data-g="semana">Sem</button>
            <button class="gb" data-g="mes">Mês</button>
          </div>
        </div>
        <div class="alerts" id="alerts"></div>
        <div class="leg">
          <span class="li"><span class="ls" style="background:var(--accent)"></span>Valor usado</span>
          <span class="li"><span class="ls" style="background:var(--green)"></span>Valor compras</span>
        </div>
        <div style="position:relative;height:220px">
          <canvas id="cInvest" role="img" aria-label="Investimento e compras"></canvas>
        </div>
      </div>

      <div class="card funil-card fu fu3">
        <div class="card-hd">
          <div>
            <div class="card-title">Funil</div>
            <div class="card-sub">Do clique à compra</div>
          </div>
        </div>
        <div class="funnel" id="funnel"></div>
      </div>
    </div>

    <!-- TABLE -->
    <div class="card fu fu4">
      <div class="tbl-toggle" onclick="toggleTbl(this)">
        <div>
          <div class="tbl-toggle-label">Detalhamento completo</div>
          <div style="font-size:11px;color:var(--text-3);margin-top:2px" id="tbl-sub"></div>
        </div>
        <span class="tbl-toggle-icon">▼</span>
      </div>
      <div class="tbl-body" id="tbl-body">
        <div class="gran-tbl">
          <button class="gb active" data-gt="dia">Dia</button>
          <button class="gb" data-gt="semana">Semana</button>
          <button class="gb" data-gt="mes">Mês</button>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead><tr>
              <th>Período</th>
              <th class="r">Valor usado</th>
              <th class="r">Impressões</th>
              <th class="r">Alcance</th>
              <th class="r">Freq.</th>
              <th class="r">Cliques</th>
              <th class="r">CTR</th>
              <th class="r">CPM</th>
              <th class="r">Resultados</th>
              <th class="r">Add carrinho</th>
              <th class="r">Custo/add</th>
              <th class="r">Compras</th>
              <th class="r">Vlr compras</th>
              <th class="r">Custo/compra</th>
              <th class="r">ROAS</th>
            </tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </div>

  </div>`;

  // Eventos período
  document.querySelectorAll('.pb').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.pb').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); periodo = b.dataset.p;
    const cr = document.getElementById('cr');
    periodo==='custom' ? cr.classList.add('on') : cr.classList.remove('on');
    if (periodo !== 'custom') render();
  }));

  // Granularidade chart
  document.querySelectorAll('.gb[data-g]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.gb[data-g]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); gran = b.dataset.g;
    renderChart(filtrar(periodo));
  }));

  // Granularidade tabela
  document.querySelectorAll('.gb[data-gt]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.gb[data-gt]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); granTbl = b.dataset.gt;
    renderTabela(filtrar(periodo), granTbl);
  }));
}

function toggleTbl(el) {
  const body = document.getElementById('tbl-body');
  const icon = el.querySelector('.tbl-toggle-icon');
  body.classList.toggle('open');
  icon.classList.toggle('open');
}

function applyCustom() {
  customFrom = document.getElementById('df').value;
  customTo   = document.getElementById('dt').value;
  if (customFrom && customTo) render();
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const dias = filtrar(periodo);
  const ant  = filtrarAnt();
  const tot  = somar(dias);
  const totA = somar(ant);

  renderHero(tot, totA, dias.length);
  renderAlertas(tot);
  renderFunil(tot, dias.length);
  renderChart(dias);
  renderTabela(dias, 'dia');
  document.querySelectorAll('.gb[data-gt]').forEach(b=>b.classList.remove('active'));
  const gtDia = document.querySelector('.gb[data-gt="dia"]');
  if (gtDia) gtDia.classList.add('active');
  granTbl = 'dia';
}

// ── HERO KPIs ─────────────────────────────────────────────
function renderHero(tot, ant, qtd) {
  const roasColor = !qtd ? 'var(--text-2)' : tot.roas >= METAS.roasOtimo ? 'var(--green)' : tot.roas >= METAS.roasMin ? 'var(--amber)' : 'var(--red)';
  const items = [
    { label: 'Valor investido',  val: qtd ? fR(tot.valorUsado)  : '—', d: dlt(tot.valorUsado,ant.valorUsado),   inv: true,  color: 'var(--accent)' },
    { label: 'Valor em compras', val: qtd ? fR(tot.valorCompras): '—', d: dlt(tot.valorCompras,ant.valorCompras),inv: false, color: 'var(--green)'  },
    { label: 'Compras',          val: qtd ? fN(tot.compras)     : '—', d: dlt(tot.compras,ant.compras),          inv: false, color: 'var(--text)'   },
    { label: 'ROAS',             val: qtd ? fX(tot.roas)        : '—', d: dlt(tot.roas,ant.roas),                inv: false, color: roasColor        },
  ];
  document.getElementById('hero').innerHTML = items.map((k,i) => {
    const dv  = k.d !== null ? Math.abs(k.d).toFixed(1)+'%' : null;
    const isUp = k.inv ? k.d < 0 : k.d > 0;
    const cls  = k.d === null ? 'nt' : isUp ? 'up' : 'dn';
    const icon = k.d === null ? '' : isUp ? '↑ ' : '↓ ';
    const colors = ['var(--accent)','var(--green)','var(--purple)',''];
    return `<div class="hero-kpi" style="--hc:${colors[i]}">
      <div class="hk-label">${k.label}</div>
      <div class="hk-val" style="color:${k.color}">${k.val}</div>
      ${dv ? '<div class="hk-delta '+cls+'">'+icon+dv+' vs anterior</div>' : ''}
    </div>`;
  }).join('');
}

// ── ALERTAS ───────────────────────────────────────────────
function renderAlertas(tot) {
  const el = document.getElementById('alerts');
  if (!tot.roas) { el.innerHTML = ''; return; }

  const list = [];
  if (tot.roas >= METAS.roasOtimo)
    list.push({c:'alert-ok',  t:'ROAS acima da meta',        d:'Campanha gerando retorno acima do esperado', v:fX(tot.roas)});
  else if (tot.roas >= METAS.roasMin)
    list.push({c:'alert-warn',t:'ROAS abaixo do ideal',      d:'Meta é '+fX(METAS.roasOtimo)+' — revisar criativos', v:fX(tot.roas)});
  else
    list.push({c:'alert-bad', t:'ROAS crítico',              d:'Abaixo do mínimo de '+fX(METAS.roasMin), v:fX(tot.roas)});

  if (tot.custoC > METAS.custoCompraMax)
    list.push({c:'alert-bad', t:'Custo por compra elevado',  d:'Acima do limite de '+fR(METAS.custoCompraMax), v:fR(tot.custoC)});

  if (tot.ctr < METAS.ctrMin)
    list.push({c:'alert-warn',t:'CTR abaixo do esperado',    d:'Criativos podem estar perdendo relevância', v:fP(tot.ctr)});

  if (tot.freq > METAS.freqMax)
    list.push({c:'alert-warn',t:'Frequência alta',           d:'Risco de fadiga criativa no público', v:fX(tot.freq)});

  el.innerHTML = list.map(a =>
    `<div class="alert ${a.c}">
      <div class="alert-dot"></div>
      <div class="alert-body">
        <div class="alert-title">${a.t}</div>
        <div class="alert-desc">${a.d}</div>
      </div>
      <div class="alert-num">${a.v}</div>
    </div>`
  ).join('');
}

// ── FUNIL ─────────────────────────────────────────────────
function renderFunil(tot, qtd) {
  const el = document.getElementById('funnel');
  if (!qtd) { el.innerHTML = '<div class="empty">Sem dados no período</div>'; return; }
  const steps = [
    {n:'Cliques',        v:tot.cliquesLink,  c:'var(--accent)'},
    {n:'Add carrinho',   v:tot.addCarrinho,  c:'var(--purple)'},
    {n:'Resultados',     v:tot.resultados,   c:'#60a5fa'},
    {n:'Compras',        v:tot.compras,      c:'var(--green)'},
  ];
  const max = steps[0].v || 1;
  el.innerHTML = steps.map((s,i) => {
    const pct  = Math.round(s.v/max*100);
    const taxa = i===0 ? '' : Math.round(s.v/(steps[i-1].v||1)*100)+'% do anterior';
    return (i>0?'<div class="farrow">↓ '+taxa+'</div>':'')+
      '<div class="fs">'+
        '<div class="fl"><div class="fn">'+s.n+'</div><div class="fnum">'+fN(s.v)+'</div></div>'+
        '<div class="ftrack"><div class="fbar" style="width:'+pct+'%;background:'+s.c+'">'+(pct>20?pct+'%':'')+'</div></div>'+
        '<div class="fpct">'+pct+'%</div>'+
      '</div>';
  }).join('');
}

// ── CHART ─────────────────────────────────────────────────
function renderChart(dias) {
  if (charts.inv) { charts.inv.destroy(); delete charts.inv; }
  const rows = agrupar(dias, gran);
  if (!rows.length) return;
  charts.inv = new Chart(document.getElementById('cInvest'), {
    type: 'line',
    data: { labels: rows.map(r=>r.label), datasets: [
      { label:'Valor usado',   data:rows.map(r=>r.valorUsado||0),   borderColor:'#e63946', backgroundColor:'rgba(230,57,70,0.07)',  fill:true, tension:0.4, pointRadius:rows.length>20?0:3, borderWidth:2 },
      { label:'Vlr compras',   data:rows.map(r=>r.valorCompras||0), borderColor:'#22c55e', backgroundColor:'rgba(34,197,94,0.07)',  fill:true, tension:0.4, pointRadius:rows.length>20?0:3, borderWidth:2, borderDash:[5,4] },
    ]},
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#18181d',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,padding:10,callbacks:{label:ctx=>ctx.dataset.label+': '+fR(ctx.parsed.y)}}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.02)'},ticks:{font:{size:10},color:'#4a4a5a',maxTicksLimit:14,maxRotation:0}},
        y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{font:{size:10},color:'#4a4a5a',callback:v=>'R$'+(v>=1000?(v/1000).toFixed(0)+'k':v)}}
      }
    }
  });
}

// ── TABELA ────────────────────────────────────────────────
function renderTabela(dias, g) {
  const rows = agrupar(dias, g);
  const sub  = document.getElementById('tbl-sub');
  if (sub) sub.textContent = rows.length ? rows.length+' '+(g==='dia'?'dias':g==='semana'?'semanas':'meses') : 'Sem dados';

  if (!rows.length) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="15" style="text-align:center;padding:24px;color:var(--text-3)">Sem dados no período</td></tr>';
    return;
  }
  document.getElementById('tbody').innerHTML = rows.map(r => `
    <tr>
      <td class="dc">${r.label}</td>
      <td class="r">${fR(r.valorUsado||0)}</td>
      <td class="r">${fN(r.impressoes||0)}</td>
      <td class="r">${fN(r.alcance||0)}</td>
      <td class="r">${fX(r.freq||0)}</td>
      <td class="r">${fN(r.cliquesLink||0)}</td>
      <td class="r">${fP(r.ctr||0)}</td>
      <td class="r">${fR(r.cpm||0)}</td>
      <td class="r">${fN(r.resultados||0)}</td>
      <td class="r">${fN(r.addCarrinho||0)}</td>
      <td class="r">${fR(r.custoA||0)}</td>
      <td class="r vup">${fN(r.compras||0)}</td>
      <td class="r vup">${fR(r.valorCompras||0)}</td>
      <td class="r ${(r.custoC||0)<=METAS.custoCompraMax?'vup':'vdn'}">${fR(r.custoC||0)}</td>
      <td class="r ${(r.roas||0)>=METAS.roasMin?'vup':'vdn'}">${fX(r.roas||0)}</td>
    </tr>`).join('');
}

init();
</script>
