<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animextreme — Meta Ads</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap');
:root{
  --bg:#0a0a0c;--surface:#111114;--surface2:#18181d;--surface3:#222228;
  --border:rgba(255,255,255,0.06);--border-md:rgba(255,255,255,0.11);
  --text:#ededf0;--text-2:#8a8a9a;--text-3:#4a4a5a;
  --accent:#e63946;--accent2:#ff6b35;
  --green:#22c55e;--green-bg:rgba(34,197,94,0.08);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.08);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.08);
  --purple:#a78bfa;--purple-bg:rgba(167,139,250,0.08);
  --blue:#60a5fa;
  --r:12px;--r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
@keyframes rot{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fadeUp .4s ease both;}
.fu1{animation-delay:.00s}.fu2{animation-delay:.06s}.fu3{animation-delay:.12s}
.fu4{animation-delay:.18s}.fu5{animation-delay:.24s}.fu6{animation-delay:.30s}

/* HEADER */
.hdr{padding:14px 32px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);background:var(--surface);
  position:sticky;top:0;z-index:20;gap:16px;flex-wrap:wrap;}
.hdr-left{display:flex;align-items:center;gap:12px;}
.ax-pill{background:linear-gradient(135deg,var(--accent),var(--accent2));
  font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:.1em;color:white;padding:4px 10px;border-radius:6px;}
.hdr-name{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;}
.hdr-sub{font-size:11px;color:var(--text-3);margin-top:1px;}
.hdr-right{display:flex;align-items:center;gap:16px;}
.countdown{display:flex;align-items:center;gap:8px;
  background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);
  border-radius:var(--r-sm);padding:5px 12px;}
.cd-num{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:var(--accent);line-height:1;}
.cd-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;}
.upd{font-size:11px;color:var(--text-3);font-family:'DM Mono',monospace;}

/* PERIOD */
.period{background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 32px;display:flex;align-items:center;flex-wrap:wrap;}
.pb{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;
  padding:12px 14px;border:none;background:transparent;color:var(--text-2);
  cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.pb:hover{color:var(--text);}
.pb.active{color:var(--accent);border-bottom-color:var(--accent);}
.cr{display:none;align-items:center;gap:8px;margin-left:auto;padding:8px 0;}
.cr.on{display:flex;}
.cr input{font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;
  border:1px solid var(--border-md);border-radius:6px;background:var(--surface2);color:var(--text);}
.cr-btn{font-size:11px;font-weight:600;padding:5px 12px;background:var(--accent);
  color:white;border:none;border-radius:6px;cursor:pointer;}

.main{padding:20px 32px 56px;display:flex;flex-direction:column;gap:16px;max-width:1400px;margin:0 auto;}

/* HERO KPIs */
.hero{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;
  background:var(--border);border-radius:var(--r);overflow:hidden;}
.hk{background:var(--surface);padding:20px 22px 16px;position:relative;transition:background .15s;}
.hk:hover{background:var(--surface2);}
.hk-stripe{position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0;}
.hk-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px;}
.hk-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);}
.hk-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.bok{background:var(--green-bg);color:var(--green);}
.bwk{background:var(--amber-bg);color:var(--amber);}
.bbd{background:var(--red-bg);color:var(--red);}
.bnt{background:rgba(255,255,255,.04);color:var(--text-3);}
.hk-val{font-family:'Rajdhani',sans-serif;font-size:34px;font-weight:700;letter-spacing:-.01em;line-height:1.1;}
.hk-meta{font-size:11px;color:var(--text-3);margin-top:5px;}
.hk-delta{margin-top:8px;font-size:11px;font-weight:500;
  display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;}
.up{background:var(--green-bg);color:var(--green);}
.dn{background:var(--red-bg);color:var(--red);}
.nt{background:rgba(255,255,255,.04);color:var(--text-3);}

/* VERBA */
.verba-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 22px;}
.verba-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;gap:16px;flex-wrap:wrap;}
.verba-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:.02em;}
.verba-nums{display:flex;gap:24px;flex-wrap:wrap;}
.vn-item{text-align:right;}
.vn-label{font-size:10px;color:var(--text-3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.vn-val{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;line-height:1;}
.progress-wrap{margin-bottom:14px;}
.prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text-3);margin-bottom:5px;}
.prog-track{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.prog-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .8s ease;}

/* CARDS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 20px;}
.card-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;}
.card-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:.02em;}
.card-sub{font-size:11px;color:var(--text-3);margin-top:2px;}

/* GRAN */
.gran{display:flex;gap:3px;flex-shrink:0;}
.gb{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  padding:3px 8px;border-radius:4px;border:1px solid var(--border-md);
  background:transparent;color:var(--text-3);cursor:pointer;transition:all .12s;
  text-transform:uppercase;letter-spacing:.04em;}
.gb.active{background:var(--accent);color:white;border-color:var(--accent);}

.leg{display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap;}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-2);}
.ls{width:8px;height:8px;border-radius:2px;}

/* ALERTAS */
.alerts{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.alert{display:flex;align-items:center;gap:10px;padding:8px 12px;
  border-radius:var(--r-sm);font-size:12px;border-left:2px solid;}
.aok{border-color:var(--green);background:rgba(34,197,94,.05);}
.awk{border-color:var(--amber);background:rgba(245,158,11,.05);}
.abd{border-color:var(--red);background:rgba(239,68,68,.05);}
.a-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.aok .a-dot{background:var(--green);}.awk .a-dot{background:var(--amber);}.abd .a-dot{background:var(--red);}
.a-body{flex:1;}
.a-title{font-weight:500;color:var(--text);font-size:12px;}
.a-desc{color:var(--text-3);font-size:10px;margin-top:1px;}
.a-val{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-2);white-space:nowrap;}

/* CARRINHO GRID */
.cart-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.cart-item{background:var(--surface2);border-radius:var(--r-sm);padding:12px 14px;}
.ci-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);margin-bottom:5px;}
.ci-val{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;line-height:1.1;}
.ci-sub{font-size:10px;color:var(--text-3);margin-top:3px;}

/* RANKING */
.ranking{display:flex;flex-direction:column;gap:6px;}
.rk-item{display:flex;align-items:center;gap:12px;padding:12px 14px;
  background:var(--surface2);border-radius:var(--r-sm);transition:background .15s;}
.rk-item:hover{background:var(--surface3);}
.rk-pos{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;
  color:var(--text-3);min-width:20px;text-align:center;}
.gold{color:#f59e0b;}.silver{color:#9ca3af;}.bronze{color:#b45309;}
.rk-info{flex:1;min-width:0;}
.rk-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rk-set{font-size:10px;color:var(--text-3);margin-top:1px;}
.rk-bar-track{height:3px;background:var(--surface);border-radius:2px;overflow:hidden;margin-top:5px;}
.rk-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
.rk-metrics{display:flex;gap:16px;flex-shrink:0;}
.rk-m{text-align:right;min-width:52px;}
.rk-m-val{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;}
.rk-m-label{font-size:9px;color:var(--text-3);text-transform:uppercase;letter-spacing:.04em;margin-top:1px;}

/* TABLE */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;
  color:var(--text-3);padding:8px 10px;border-bottom:1px solid var(--border);
  text-align:left;white-space:nowrap;}
th.r{text-align:right;}
td{padding:8px 10px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:middle;}
td.r{text-align:right;font-family:'DM Mono',monospace;font-size:11px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);}
.dc{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-2);}
.vup{color:var(--green);}.vdn{color:var(--red);}

.empty{display:flex;align-items:center;justify-content:center;
  min-height:100px;color:var(--text-3);font-size:13px;}
.err{background:var(--red-bg);border:1px solid rgba(239,68,68,.15);
  border-radius:var(--r);padding:20px;color:var(--red);font-size:13px;
  line-height:1.6;max-width:480px;margin:32px;}

@media(max-width:900px){
  .hdr,.period,.main{padding-left:16px;padding-right:16px;}
  .hero{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr;}
  .countdown{display:none;}
  .rk-metrics{display:none;}
  .verba-nums{gap:12px;}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="ax-pill">AX34</div>
    <div>
      <div class="hdr-name">Animextreme</div>
      <div class="hdr-sub">Meta Ads — Resultados de campanha</div>
    </div>
  </div>
  <div class="hdr-right">
    <div class="countdown" id="countdown"></div>
    <span class="upd" id="upd">—</span>
  </div>
</header>

<nav class="period">
  <button class="pb active" data-p="7d">Últimos 7 dias</button>
  <button class="pb" data-p="30d">Últimos 30 dias</button>
  <button class="pb" data-p="mes">Mês atual</button>
  <button class="pb" data-p="mes-ant">Mês anterior</button>
  <button class="pb" data-p="custom">Personalizado</button>
  <div class="cr" id="cr">
    <input type="date" id="df">
    <span style="color:var(--text-3);font-size:11px">até</span>
    <input type="date" id="dt">
    <button class="cr-btn" onclick="applyCustom()">Aplicar</button>
  </div>
</nav>

<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;color:var(--text-3)">
    <div style="width:28px;height:28px;border:2px solid rgba(255,255,255,.08);border-top-color:var(--accent);border-radius:50%;animation:rot .7s linear infinite"></div>
    <span style="font-size:13px">Carregando dados…</span>
  </div>
</div>

<script>
const DADOS_URL = 'https://raw.githubusercontent.com/nairomoreira/relatorio-campanhas/main/dados.json';
const CFG = {
  verbaTotal:      25000,
  dataEvento:      '2026-10-17',
  roasMin:         2.0,
  roasOtimo:       3.0,
  custoCompraMax:  30,
  custoCompraOtimo:20,
  ctrMin:          1.0,
  freqMax:         4.0,
};

let raw = [], rawAds = [], periodo = '7d', gran = 'dia', charts = {};
let customFrom = null, customTo = null;

// ── BOOT ──────────────────────────────────────────────────
async function init() {
  renderCountdown();
  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 10000);
    const res = await fetch(DADOS_URL + '?t=' + Date.now(), { signal: ctrl.signal });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    raw    = (json.dias    || []).filter(d => d && d.data).sort((a,b) => a.data.localeCompare(b.data));
    rawAds = (json.anuncios|| []);
    const upd = document.getElementById('upd');
    if (upd && json.atualizadoEm) upd.textContent = 'Atualizado ' + json.atualizadoEm;
    buildApp();
    render();
  } catch(e) {
    document.getElementById('app').innerHTML =
      '<div class="err"><strong style="display:block;margin-bottom:6px">Erro ao carregar dados</strong>' +
      (e.name === 'AbortError' ? 'Tempo limite excedido.' : e.message) + '</div>';
  }
}

// ── DATA UTILS ────────────────────────────────────────────
function parseData(s) {
  const p = String(s).split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}
function dataStr(dt) {
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,'0');
  const d = String(dt.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+d;
}

// ── COUNTDOWN ─────────────────────────────────────────────
function renderCountdown() {
  const p = CFG.dataEvento.split('-');
  const ev = new Date(+p[0], +p[1]-1, +p[2]);
  const hj = new Date(); hj.setHours(0,0,0,0);
  const dias = Math.max(0, Math.round((ev-hj)/864e5));
  const el = document.getElementById('countdown');
  if (el) el.innerHTML = '<div><div class="cd-num">'+dias+'</div><div class="cd-label">dias para o AX34</div></div>';
}

// ── FILTROS ───────────────────────────────────────────────
function filtrar(p) {
  if (!raw.length) return [];
  const ult = parseData(raw[raw.length-1].data);
  let de, ate;
  if      (p==='7d')     { ate=ult; de=new Date(ult); de.setDate(de.getDate()-6); }
  else if (p==='30d')    { ate=ult; de=new Date(ult); de.setDate(de.getDate()-29); }
  else if (p==='mes')    { de=new Date(ult.getFullYear(),ult.getMonth(),1); ate=ult; }
  else if (p==='mes-ant'){ de=new Date(ult.getFullYear(),ult.getMonth()-1,1); ate=new Date(ult.getFullYear(),ult.getMonth(),0); }
  else if (p==='custom'&&customFrom&&customTo){ de=parseData(customFrom); ate=parseData(customTo); }
  else return raw;
  const ds = dataStr(de), as = dataStr(ate);
  return raw.filter(d => d.data >= ds && d.data <= as);
}

function filtrarAnt() {
  const cur = filtrar(periodo);
  if (!cur.length) return [];
  const de  = parseData(cur[0].data);
  const ate = parseData(cur[cur.length-1].data);
  const d   = Math.round((ate-de)/864e5)+1;
  const deA = new Date(de); deA.setDate(deA.getDate()-d);
  const ateA= new Date(de); ateA.setDate(ateA.getDate()-1);
  return raw.filter(d => d.data >= dataStr(deA) && d.data <= dataStr(ateA));
}

// ── AGREGAR ───────────────────────────────────────────────
const SK = ['valorUsado','impressoes','alcance','cliquesLink','addCarrinho','compras','valorCompras'];
function somar(dias) {
  const t = SK.reduce((a,m) => { a[m]=dias.reduce((s,d)=>s+(+d[m]||0),0); return a; }, {});
  t.ctr    = t.impressoes  ? t.cliquesLink/t.impressoes*100 : 0;
  t.roas   = t.valorUsado  ? t.valorCompras/t.valorUsado : 0;
  t.custoC = t.compras     ? t.valorUsado/t.compras : 0;
  t.custoA = t.addCarrinho ? t.valorUsado/t.addCarrinho : 0;
  t.freq   = t.alcance     ? t.impressoes/t.alcance : 0;
  t.cpm    = t.impressoes  ? t.valorUsado/t.impressoes*1000 : 0;
  t.txConv = t.addCarrinho ? t.compras/t.addCarrinho*100 : 0;
  return t;
}

function agrupar(dias, g) {
  if (g==='dia') return dias.map(d => ({ label:fd(d.data), ...d, ...somar([d]) }));
  const map = {};
  dias.forEach(d => {
    let key;
    if (g==='semana') {
      const dt = parseData(d.data), dom = new Date(dt);
      dom.setDate(dt.getDate()-dt.getDay()); key = dataStr(dom);
    } else key = d.data.slice(0,7);
    if (!map[key]) map[key] = [];
    map[key].push(d);
  });
  return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]))
    .map(([k,v]) => ({ label: g==='semana'?'Sem '+fd(k):fm(k), ...somar(v) }));
}

function calcVerba() {
  const inv  = raw.reduce((s,d)=>s+(+d.valorUsado||0),0);
  const rest = CFG.verbaTotal - inv;
  const p    = CFG.dataEvento.split('-');
  const ev   = new Date(+p[0],+p[1]-1,+p[2]);
  const hj   = new Date(); hj.setHours(0,0,0,0);
  const dr   = Math.max(1, Math.round((ev-hj)/864e5));
  // Média real dos últimos 7 dias
  const ult7 = raw.slice(-7);
  const mediaReal = ult7.length ? ult7.reduce((s,d)=>s+(+d.valorUsado||0),0)/ult7.length : 0;
  return { inv, rest, dr, mediaNec:rest/dr, mediaReal, pct:Math.min(100,inv/CFG.verbaTotal*100) };
}

// ── FORMATOS ──────────────────────────────────────────────
function fd(s) { const[,m,d]=s.split('-'); return d+'/'+m; }
function fm(s) { const ms=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],[,m]=s.split('-'); return ms[+m-1]; }
function fN(n) { if(n>=1e6) return (n/1e6).toFixed(1).replace('.',',')+' M'; if(n>=1e3) return n.toLocaleString('pt-BR'); return String(Math.round(n)); }
function fR(n) { return 'R$\u00a0'+Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fP(n) { return Number(n).toFixed(2).replace('.',',')+'\u0025'; }
function fX(n) { return Number(n).toFixed(2).replace('.',',')+'x'; }
function dlt(a,b) { return b ? (a-b)/b*100 : null; }

// ── BUILD APP ─────────────────────────────────────────────
function buildApp() {
  document.getElementById('app').innerHTML = `
  <div class="main">
    <div class="hero fu fu1" id="hero"></div>

    <div class="verba-card fu fu2" id="verba"></div>

    <div class="two-col fu fu3">
      <div class="card">
        <div class="card-hd">
          <div><div class="card-title">Evolução do ROAS</div>
          <div class="card-sub">Verde = acima da meta · Vermelho = abaixo</div></div>
          <div class="gran">
            <button class="gb active" data-g="dia">Dia</button>
            <button class="gb" data-g="semana">Sem</button>
            <button class="gb" data-g="mes">Mês</button>
          </div>
        </div>
        <div class="alerts" id="alerts"></div>
        <div style="position:relative;height:210px"><canvas id="cRoas" role="img" aria-label="Evolução ROAS"></canvas></div>
      </div>
      <div class="card">
        <div class="card-hd">
          <div><div class="card-title">Carrinho &amp; Compras</div>
          <div class="card-sub">Métricas de conversão no período</div></div>
        </div>
        <div class="cart-grid" id="cart"></div>
      </div>
    </div>

    <div class="card fu fu4">
      <div class="card-hd">
        <div><div class="card-title">Ranking de anúncios</div>
        <div class="card-sub">Ordenado por compras no período</div></div>
      </div>
      <div class="ranking" id="ranking"></div>
    </div>

    <div class="card fu fu5">
      <div class="card-hd" style="flex-wrap:wrap;gap:10px">
        <div><div class="card-title">Detalhamento</div>
        <div class="card-sub" id="tbl-sub"></div></div>
        <div class="gran">
          <button class="gb active" data-gt="dia">Dia</button>
          <button class="gb" data-gt="semana">Semana</button>
          <button class="gb" data-gt="mes">Mês</button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Período</th>
            <th class="r">Valor usado</th><th class="r">Impressões</th><th class="r">Alcance</th>
            <th class="r">Freq.</th><th class="r">Cliques</th><th class="r">CTR</th>
            <th class="r">CPM</th><th class="r">Add carrinho</th><th class="r">Custo/add</th>
            <th class="r">Compras</th><th class="r">Vlr compras</th>
            <th class="r">Custo/compra</th><th class="r">ROAS</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>`;

  document.querySelectorAll('.pb').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.pb').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); periodo = b.dataset.p;
    const cr = document.getElementById('cr');
    periodo==='custom' ? cr.classList.add('on') : cr.classList.remove('on');
    if (periodo !== 'custom') render();
  }));
  document.querySelectorAll('.gb[data-g]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.gb[data-g]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); gran = b.dataset.g;
    renderRoas(filtrar(periodo));
    renderVerba(calcVerba(), filtrar(periodo));
  }));
  document.querySelectorAll('.gb[data-gt]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.gb[data-gt]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    renderTabela(filtrar(periodo), b.dataset.gt);
  }));
}

function applyCustom() {
  customFrom = document.getElementById('df').value;
  customTo   = document.getElementById('dt').value;
  if (customFrom && customTo) render();
}

// ── RENDER ────────────────────────────────────────────────
function render() {
  const dias = filtrar(periodo);
  const ant  = filtrarAnt();
  const tot  = somar(dias);
  const totA = somar(ant);
  const v    = calcVerba();

  renderHero(tot, totA, dias.length);
  renderVerba(v, dias);
  renderAlertas(tot);
  renderCart(tot, dias.length);
  renderRoas(dias);
  renderRanking(dias);
  renderTabela(dias, 'dia');
  document.querySelectorAll('.gb[data-gt]').forEach(b=>b.classList.remove('active'));
  const d = document.querySelector('.gb[data-gt="dia"]');
  if (d) d.classList.add('active');
}

// ── HERO ──────────────────────────────────────────────────
function renderHero(tot, ant, qtd) {
  const e = !qtd;
  function badge(c1,c2,l1,l2,l3){ return e?['bnt','—']:c1?['bok',l1]:c2?['bwk',l2]:['bbd',l3]; }
  function dl(d,inv){
    if (d===null||e) return '';
    const u = inv ? d<0 : d>0;
    return '<div class="hk-delta '+(u?'up':'dn')+'">'+(u?'↑ ':'↓ ')+Math.abs(d).toFixed(1)+'% vs anterior</div>';
  }
  const [ccC,ccT] = badge(tot.custoC<=CFG.custoCompraOtimo, tot.custoC<=CFG.custoCompraMax, 'Ótimo','Aceitável','Acima do limite');
  const [ctC,ctT] = badge(tot.ctr>=CFG.ctrMin*1.5, tot.ctr>=CFG.ctrMin, 'Ótimo','Aceitável','Abaixo');
  const [rcC,rcT] = badge(tot.roas>=CFG.roasOtimo, tot.roas>=CFG.roasMin, 'Acima da meta','Aceitável','Crítico');
  const roasColor = e?'var(--text-2)':tot.roas>=CFG.roasOtimo?'var(--green)':tot.roas>=CFG.roasMin?'var(--amber)':'var(--red)';
  const stripes   = ['var(--accent)','var(--green)','var(--blue)','var(--purple)'];

  const items = [
    { label:'Custo por compra',  val:e?'—':fR(tot.custoC),   badge:ccC, badgeTxt:ccT,
      meta:'Meta: até '+fR(CFG.custoCompraMax),              delta:dl(dlt(tot.custoC,ant.custoC),true),  color:'var(--text)' },
    { label:'ROAS',              val:e?'—':fX(tot.roas),      badge:rcC, badgeTxt:rcT,
      meta:'Meta: '+fX(CFG.roasOtimo),                       delta:dl(dlt(tot.roas,ant.roas),false),     color:roasColor },
    { label:'Valor investido',   val:e?'—':fR(tot.valorUsado),badge:'bnt',badgeTxt:e?'—':fN(tot.compras)+' compras',
      meta:fN(tot.impressoes)+' impressões',                 delta:dl(dlt(tot.valorUsado,ant.valorUsado),true), color:'var(--accent)' },
    { label:'Valor em compras',  val:e?'—':fR(tot.valorCompras),badge:'bnt',badgeTxt:e?'—':'ROAS '+fX(tot.roas),
      meta:fN(tot.compras)+' compras geradas',               delta:dl(dlt(tot.valorCompras,ant.valorCompras),false), color:'var(--green)' },
  ];

  document.getElementById('hero').innerHTML = items.map((k,i) => `
    <div class="hk">
      <div class="hk-stripe" style="background:${stripes[i]}"></div>
      <div class="hk-top">
        <div class="hk-label">${k.label}</div>
        <div class="hk-badge ${k.badge}">${k.badgeTxt}</div>
      </div>
      <div class="hk-val" style="color:${k.color}">${k.val}</div>
      <div class="hk-meta">${k.meta}</div>
      ${k.delta}
    </div>`).join('');
}

// ── VERBA ─────────────────────────────────────────────────
function renderVerba(v, dias) {
  const ritmoColor = v.mediaReal <= v.mediaNec*0.8 ? 'var(--amber)' :
                     v.mediaReal <= v.mediaNec*1.2 ? 'var(--green)' : 'var(--red)';
  const ritmoTxt   = v.mediaReal <= v.mediaNec*0.8 ? 'Abaixo do ritmo' :
                     v.mediaReal <= v.mediaNec*1.2 ? 'No ritmo certo' : 'Acima do ritmo';

  document.getElementById('verba').innerHTML = `
    <div class="verba-top">
      <div>
        <div class="verba-title">Gestão de verba — R$ ${CFG.verbaTotal.toLocaleString('pt-BR')} total</div>
        <div style="font-size:11px;color:var(--text-3);margin-top:2px">${v.dr} dias até o evento · ${v.pct.toFixed(1)}% utilizado</div>
      </div>
      <div class="verba-nums">
        <div class="vn-item">
          <div class="vn-label">Investido</div>
          <div class="vn-val" style="color:var(--accent)">${fR(v.inv)}</div>
        </div>
        <div class="vn-item">
          <div class="vn-label">Restante</div>
          <div class="vn-val" style="color:var(--green)">${fR(v.rest)}</div>
        </div>
        <div class="vn-item">
          <div class="vn-label">Média necessária/dia</div>
          <div class="vn-val">${fR(v.mediaNec)}</div>
        </div>
        <div class="vn-item">
          <div class="vn-label">Gasto real/dia (7d)</div>
          <div class="vn-val" style="color:${ritmoColor}">${fR(v.mediaReal)} <span style="font-size:11px;font-family:'DM Sans'">${ritmoTxt}</span></div>
        </div>
      </div>
    </div>
    <div class="progress-wrap">
      <div class="prog-labels"><span>Verba utilizada</span><span>${fR(v.inv)} de ${fR(CFG.verbaTotal)}</span></div>
      <div class="prog-track"><div class="prog-bar" style="width:${v.pct}%"></div></div>
    </div>
    <div class="leg">
      <span class="li"><span class="ls" style="background:var(--accent)"></span>Gasto diário</span>
      <span class="li"><span class="ls" style="background:rgba(255,255,255,.3);border:1px dashed rgba(255,255,255,.3)"></span>Média necessária</span>
    </div>
    <div style="position:relative;height:140px"><canvas id="cVerba" role="img" aria-label="Ritmo de gasto diário"></canvas></div>`;

  renderChartVerba(dias);
}

// ── ALERTAS ───────────────────────────────────────────────
function renderAlertas(tot) {
  const el = document.getElementById('alerts');
  if (!tot.roas) { el.innerHTML=''; return; }
  const list = [];
  if (tot.roas >= CFG.roasOtimo)
    list.push({c:'aok',t:'ROAS acima da meta',d:'Retorno acima de '+fX(CFG.roasOtimo),v:fX(tot.roas)});
  else if (tot.roas >= CFG.roasMin)
    list.push({c:'awk',t:'ROAS abaixo do ideal',d:'Meta é '+fX(CFG.roasOtimo)+' — revisar criativos',v:fX(tot.roas)});
  else
    list.push({c:'abd',t:'ROAS crítico',d:'Abaixo do mínimo de '+fX(CFG.roasMin),v:fX(tot.roas)});
  if (tot.custoC > CFG.custoCompraMax)
    list.push({c:'abd',t:'Custo por compra elevado',d:'Acima do limite de '+fR(CFG.custoCompraMax),v:fR(tot.custoC)});
  if (tot.ctr < CFG.ctrMin)
    list.push({c:'awk',t:'CTR abaixo do esperado',d:'Considere atualizar criativos',v:fP(tot.ctr)});
  if (tot.freq > CFG.freqMax)
    list.push({c:'awk',t:'Frequência elevada',d:'Risco de fadiga — público vendo '+tot.freq.toFixed(1)+'x',v:''});
  el.innerHTML = list.map(a =>
    `<div class="alert ${a.c}">
      <div class="a-dot"></div>
      <div class="a-body"><div class="a-title">${a.t}</div><div class="a-desc">${a.d}</div></div>
      ${a.v ? '<div class="a-val">'+a.v+'</div>' : ''}
    </div>`).join('');
}

// ── CARRINHO & COMPRAS ────────────────────────────────────
function renderCart(tot, qtd) {
  const el = document.getElementById('cart');
  if (!qtd) { el.innerHTML='<div class="empty">Sem dados no período</div>'; return; }
  const txConv = tot.addCarrinho > 0 ? Math.round(tot.compras/tot.addCarrinho*100) : 0;
  const txColor = txConv>=20?'var(--green)':txConv>=10?'var(--amber)':'var(--red)';
  const items = [
    { label:'Add ao carrinho',    val:fN(tot.addCarrinho),  sub:'eventos',              color:'var(--purple)' },
    { label:'Valor de compras',   val:fR(tot.valorCompras), sub:'receita gerada',        color:'var(--green)'  },
    { label:'Compras efetivadas', val:fN(tot.compras),      sub:'transações',            color:'var(--green)'  },
    { label:'Tx. add→compra',     val:txConv+'%',           sub:'de adds que compraram', color:txColor         },
    { label:'Custo por add',      val:tot.addCarrinho>0?fR(tot.custoA):'—', sub:'por adição ao carrinho', color:'var(--text-2)' },
    { label:'Custo por compra',   val:tot.compras>0?fR(tot.custoC):'—',    sub:'por transação',           color:tot.custoC<=CFG.custoCompraOtimo?'var(--green)':tot.custoC<=CFG.custoCompraMax?'var(--amber)':'var(--red)' },
  ];
  el.innerHTML = items.map(k =>
    `<div class="cart-item">
      <div class="ci-label">${k.label}</div>
      <div class="ci-val" style="color:${k.color}">${k.val}</div>
      <div class="ci-sub">${k.sub}</div>
    </div>`).join('');
}

// ── RANKING ───────────────────────────────────────────────
function renderRanking(diasFiltrados) {
  const el = document.getElementById('ranking');
  if (!rawAds.length) {
    el.innerHTML = '<div class="empty">Dados de anúncios não disponíveis — publique com o script atualizado</div>';
    return;
  }
  const de  = diasFiltrados.length ? diasFiltrados[0].data : null;
  const ate = diasFiltrados.length ? diasFiltrados[diasFiltrados.length-1].data : null;
  const af  = de ? rawAds.filter(a => a.data >= de && a.data <= ate) : rawAds;
  const map = {};
  af.forEach(a => {
    const k = a.adName || 'Sem nome';
    if (!map[k]) map[k] = { adName:k, adSet:a.adSet||'', valorUsado:0, compras:0, valorCompras:0, cliques:0, impressoes:0, addCarrinho:0 };
    map[k].valorUsado   += +a.valorUsado||0;
    map[k].compras      += +a.compras||0;
    map[k].valorCompras += +a.valorCompras||0;
    map[k].cliques      += +a.cliquesLink||0;
    map[k].impressoes   += +a.impressoes||0;
    map[k].addCarrinho  += +a.addCarrinho||0;
  });
  const ads = Object.values(map)
    .map(a => ({...a, roas:a.valorUsado?a.valorCompras/a.valorUsado:0, custoC:a.compras?a.valorUsado/a.compras:0}))
    .sort((a,b) => b.compras-a.compras || b.valorCompras-a.valorCompras);
  if (!ads.length) { el.innerHTML='<div class="empty">Sem dados de anúncios no período</div>'; return; }
  const mx = ads[0].compras || 1;
  const pc = ['gold','silver','bronze'];
  el.innerHTML = ads.map((a,i) => `
    <div class="rk-item">
      <div class="rk-pos ${pc[i]||''}">${i+1}</div>
      <div class="rk-info">
        <div class="rk-name" title="${a.adName}">${a.adName}</div>
        <div class="rk-set">${a.adSet}</div>
        <div class="rk-bar-track"><div class="rk-bar-fill" style="width:${Math.round(a.compras/mx*100)}%"></div></div>
      </div>
      <div class="rk-metrics">
        <div class="rk-m">
          <div class="rk-m-val" style="color:var(--green)">${fN(a.compras)}</div>
          <div class="rk-m-label">Compras</div>
        </div>
        <div class="rk-m">
          <div class="rk-m-val">${a.custoC>0?fR(a.custoC):'—'}</div>
          <div class="rk-m-label">Custo/compra</div>
        </div>
        <div class="rk-m">
          <div class="rk-m-val" style="color:${a.roas>=CFG.roasOtimo?'var(--green)':a.roas>=CFG.roasMin?'var(--amber)':'var(--red)'}">${a.roas>0?fX(a.roas):'—'}</div>
          <div class="rk-m-label">ROAS</div>
        </div>
        <div class="rk-m">
          <div class="rk-m-val">${fR(a.valorUsado)}</div>
          <div class="rk-m-label">Investido</div>
        </div>
      </div>
    </div>`).join('');
}

// ── CHARTS ────────────────────────────────────────────────
function destroyChart(id) { if(charts[id]){ charts[id].destroy(); delete charts[id]; } }

function renderRoas(dias) {
  destroyChart('roas');
  const rows = agrupar(dias, gran);
  if (!rows.length) return;
  const rd   = rows.map(r => +((r.roas||0).toFixed(2)));
  const meta = rows.map(() => CFG.roasOtimo);
  charts.roas = new Chart(document.getElementById('cRoas'), {
    type:'line',
    data:{ labels:rows.map(r=>r.label), datasets:[
      { label:'ROAS', data:rd, borderColor:'#a78bfa', backgroundColor:'rgba(167,139,250,0.07)',
        fill:true, tension:0.4, borderWidth:2,
        pointRadius:rows.length>20?0:5,
        pointBackgroundColor:rd.map(v=>v>=CFG.roasOtimo?'#22c55e':v>=CFG.roasMin?'#f59e0b':'#ef4444'),
        pointBorderColor:'transparent' },
      { label:'Meta '+fX(CFG.roasOtimo), data:meta,
        borderColor:'rgba(230,57,70,0.5)', backgroundColor:'transparent',
        borderDash:[5,4], borderWidth:1.5, pointRadius:0 },
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false},
        tooltip:{backgroundColor:'#18181d',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,padding:10,
          callbacks:{label:ctx=>ctx.dataset.label+': '+fX(ctx.parsed.y)}} },
      scales:{
        x:{grid:{color:'rgba(255,255,255,0.02)'},ticks:{font:{size:10},color:'#4a4a5a',maxTicksLimit:14,maxRotation:0}},
        y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{font:{size:10},color:'#4a4a5a',callback:v=>fX(v)},min:0}
      }}
  });
}

function renderChartVerba(dias) {
  destroyChart('verba');
  const el = document.getElementById('cVerba');
  if (!el || !dias.length) return;
  const v = calcVerba();
  const gastos = dias.map(d => ({ label:fd(d.data), val:+(+d.valorUsado||0).toFixed(2) }));
  const meta   = gastos.map(() => +v.mediaNec.toFixed(2));
  charts.verba = new Chart(el, {
    type:'bar',
    data:{ labels:gastos.map(d=>d.label), datasets:[
      { label:'Gasto diário', data:gastos.map(d=>d.val),
        backgroundColor:gastos.map(d=>d.val>v.mediaNec*1.2?'rgba(239,68,68,0.7)':d.val<v.mediaNec*0.8?'rgba(245,158,11,0.7)':'rgba(34,197,94,0.7)'),
        borderRadius:3, borderSkipped:false, order:2 },
      { label:'Média necessária', data:meta,
        type:'line', borderColor:'rgba(255,255,255,0.3)', backgroundColor:'transparent',
        borderDash:[4,4], borderWidth:1.5, pointRadius:0, order:1 },
    ]},
    options:{ responsive:true, maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{ legend:{display:false},
        tooltip:{backgroundColor:'#18181d',borderColor:'rgba(255,255,255,0.08)',borderWidth:1,padding:10,
          callbacks:{label:ctx=>ctx.dataset.label+': '+fR(ctx.parsed.y)}} },
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10},color:'#4a4a5a',maxTicksLimit:14,maxRotation:0}},
        y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{font:{size:10},color:'#4a4a5a',callback:v=>'R$'+(v>=1000?(v/1000).toFixed(0)+'k':v)}}
      }}
  });
}

// ── TABELA ────────────────────────────────────────────────
function renderTabela(dias, g) {
  const rows = agrupar(dias, g);
  const sub  = document.getElementById('tbl-sub');
  if (sub) sub.textContent = rows.length
    ? rows.length+' '+(g==='dia'?'dias':g==='semana'?'semanas':'meses')+' no período'
    : 'Sem dados';
  if (!rows.length) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="14" style="text-align:center;padding:24px;color:var(--text-3)">Sem dados no período</td></tr>';
    return;
  }
  document.getElementById('tbody').innerHTML = rows.map(r => `
    <tr>
      <td class="dc">${r.label}</td>
      <td class="r">${fR(r.valorUsado||0)}</td>
      <td class="r">${fN(r.impressoes||0)}</td>
      <td class="r">${fN(r.alcance||0)}</td>
      <td class="r">${fX(r.freq||0)}</td>
      <td class="r">${fN(r.cliquesLink||0)}</td>
      <td class="r">${fP(r.ctr||0)}</td>
      <td class="r">${fR(r.cpm||0)}</td>
      <td class="r">${fN(r.addCarrinho||0)}</td>
      <td class="r">${fR(r.custoA||0)}</td>
      <td class="r vup">${fN(r.compras||0)}</td>
      <td class="r vup">${fR(r.valorCompras||0)}</td>
      <td class="r ${(r.custoC||0)<=CFG.custoCompraMax?'vup':'vdn'}">${fR(r.custoC||0)}</td>
      <td class="r ${(r.roas||0)>=CFG.roasMin?'vup':'vdn'}">${fX(r.roas||0)}</td>
    </tr>`).join('');
}

init();
</script>
</body>
</html>
