name: Atualizar dados Meta Ads

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # Roda às 00h, 06h, 12h e 18h UTC (21h, 03h, 09h, 15h BRT)
  workflow_dispatch:               # Permite rodar manualmente pelo GitHub

jobs:
  coletar-dados:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar coleta de dados
        env:
          META_TOKEN:   ${{ secrets.META_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node coletar.js

      - name: Commit e push dos dados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados.json
          git diff --staged --quiet || git commit -m "dados: $(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M')"
          git push
